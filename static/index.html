<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Nifty Trading Agent</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a10;--sf:#0c1220;--cd:#111a2e;--bd:#1a2744;--ac:#00e5ff;--gn:#00e676;--rd:#ff1744;--yl:#ffc400;--tx:#e4eaf6;--dm:#5a6a8a;--bl:#448aff;--or:#ff9100}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--tx);min-height:100vh;padding:12px;padding-bottom:80px}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}input{font-family:inherit}
.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px}
.cd{padding:14px;border-radius:12px;background:var(--cd);border:1px solid var(--bd)}.ct{font-size:9px;font-weight:700;color:var(--dm);letter-spacing:1.5px;margin-bottom:10px}
.pill{padding:3px 8px;border-radius:16px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.btn{padding:7px 12px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--ac);font-weight:600;font-size:10px}
.btn-sm{padding:5px 10px;border-radius:6px;border:1px solid var(--bd);background:transparent;font-weight:600;font-size:9px;color:var(--tx)}
.lv{padding:8px;border-radius:6px;background:var(--sf)}.s2{grid-column:1/-1}
.mb{padding:8px;border-radius:8px;background:var(--sf);border-left:3px solid}
.fc{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;background:var(--sf);border-left:3px solid;font-size:10px}
table{width:100%;border-collapse:collapse;font-size:10px}th{padding:6px;font-size:9px;font-weight:600;background:var(--sf)}td{padding:4px 6px}
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--cd);border-top:1px solid var(--bd);z-index:100;padding:4px 8px;gap:2px}
.tab{flex:1;padding:8px 4px;border-radius:8px;font-size:9px;font-weight:600;border:none;background:transparent;color:var(--dm);text-align:center;line-height:1.3}
.tab.active{background:var(--sf);color:var(--ac)}.tab-icon{font-size:16px;display:block;margin-bottom:2px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:grid;place-items:center;z-index:200;padding:16px}
.modal-box{background:var(--cd);border:1px solid var(--bd);border-radius:14px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.sig-card{padding:14px;border-radius:10px;background:var(--cd);border-left:4px solid;margin-bottom:10px}
.search-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-size:14px;outline:none}
.search-input:focus{border-color:var(--ac)}
.chart-box{background:var(--sf);border-radius:10px;padding:8px;border:1px solid var(--bd);overflow:hidden}
.tf-btn{padding:6px 12px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--bd);cursor:pointer;transition:all .2s}
.tf-btn.active{background:#00e5ff25;color:var(--ac);border-color:#00e5ff50}
.tf-btn:not(.active){background:var(--sf);color:var(--tx)}
.cfg-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:6px;background:var(--sf);margin-bottom:6px}
.cfg-input{width:70px;padding:5px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--cd);color:var(--ac);font-size:12px;font-weight:700;text-align:center;outline:none}
.cfg-input:focus{border-color:var(--ac)}
.cfg-toggle{width:42px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;transition:background .2s}
.cfg-toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:white;top:2px;transition:left .2s}
.cfg-toggle.on{background:var(--gn)}.cfg-toggle.on::after{left:22px}
.cfg-toggle.off{background:var(--dm)}.cfg-toggle.off::after{left:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.pulse{animation:pulse 2s infinite}
@media(max-width:600px){.g{grid-template-columns:1fr}.s2{grid-column:1}}
</style>
</head>
<body>
<div id="app"></div>
<!-- Stock search lives outside render cycle to prevent focus loss -->
<div id="stock-search-container" style="display:none;margin-bottom:12px">
  <div style="display:flex;gap:8px">
    <input id="stock-input" class="search-input" style="flex:1" placeholder="Enter stock (RELIANCE, TCS, INFY...)" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn" style="background:var(--ac);color:var(--bg);font-weight:700;padding:12px 20px" onclick="doStockSearch()">Analyze</button>
  </div>
</div>
<div id="stock-results"></div>

<script>
const B=window.location.origin;

// ─── CONFIG (admin adjustable) ─────────────────────────────
let CFG={
  niftyLot:65, bankniftyLot:30,
  usePnF:true, useRenko:true,
  renkoSize:20, pnfBoxSize:10, pnfReversal:3,
  maxSignals:2, minScore:5
};
try{const saved=localStorage.getItem("niftyAgentCfg");if(saved)Object.assign(CFG,JSON.parse(saved))}catch{}
function saveCfg(){try{localStorage.setItem("niftyAgentCfg",JSON.stringify(CFG))}catch{}}

let S={mode:"mock",idx:"NIFTY",nSpot:22235,bSpot:53200,
nHist:[22180,22190,22200,22210,22195,22205,22220,22215,22230,22225,22240,22235,22220,22230,22235],
bHist:[53e3,53050,53100,53080,53120,53150,53130,53170,53200,53180,53160,53190,53220,53210,53200],
chain:[],result:null,todaySignals:[],lastSignalDir:null,lastSignalSpot:0,
lastSLHitTime:0,lastSLHitDir:null,recCE:null,recPE:null,
tab:"dashboard",capital:2e5,tick:0,backend:null,isAdmin:false,
showSetup:false,showConfig:false,signalHistory:[],
stockData:null,stockLoading:false,stockTF:"daily",scanData:null,scanLoading:false};

function getLots(){return{NIFTY:CFG.niftyLot,BANKNIFTY:CFG.bankniftyLot}}

// ─── TECHNICALS ────────────────────────────────────────────
const PCR=c=>{const p=c.reduce((s,r)=>s+(r.pe?.oi||0),0),q=c.reduce((s,r)=>s+(r.ce?.oi||0),0);return q?+(p/q).toFixed(2):0};
const MaxP=c=>{let m=c[0]?.strike||0,v=1/0;c.forEach(({strike:s})=>{let p=0;c.forEach(r=>{if(s>r.strike)p+=(r.ce?.oi||0)*(s-r.strike);if(s<r.strike)p+=(r.pe?.oi||0)*(r.strike-s)});if(p<v){v=p;m=s}});return m};
const VWAP=p=>p.length?+(p.reduce((s,v)=>s+v,0)/p.length).toFixed(2):0;
const RSI=(p,n=14)=>{if(p.length<n+1)return 50;let g=0,l=0;for(let i=p.length-n;i<p.length;i++){const d=p[i]-p[i-1];d>0?g+=d:l-=d}const a=g/n,b=l/n;return b===0?100:+(100-100/(1+a/b)).toFixed(1)};
const EMA=(p,n)=>{if(p.length<n)return p[p.length-1]||0;const k=2/(n+1);let e=p.slice(0,n).reduce((s,v)=>s+v,0)/n;for(let i=n;i<p.length;i++)e=p[i]*k+e*(1-k);return+e.toFixed(2)};
const STr=(p,f=2,n=10)=>{if(p.length<n)return{value:p[p.length-1],trend:"BULLISH"};const a=p.slice(-n).reduce((s,_,i,a)=>i?s+Math.abs(a[i]-a[i-1]):s,0)/(n-1);const l=p[p.length-1],lo=l-f*a;return l>lo?{value:+lo.toFixed(2),trend:"BULLISH"}:{value:+(l+f*a).toFixed(2),trend:"BEARISH"}};
const PV=(h,l,c)=>{const pp=+((h+l+c)/3).toFixed(2);return{r3:+(h+2*(pp-l)).toFixed(2),r2:+(pp+(h-l)).toFixed(2),r1:+(2*pp-l).toFixed(2),pp,s1:+(2*pp-h).toFixed(2),s2:+(pp-(h-l)).toFixed(2),s3:+(l-2*(h-pp)).toFixed(2)}};

// ─── RENKO CHART BUILDER ───────────────────────────────────
function buildRenko(closes,brickSize){
  if(!closes||closes.length<2)return{bricks:[],trend:"NEUTRAL",signal:0};
  const bs=brickSize||CFG.renkoSize;
  let bricks=[],base=Math.floor(closes[0]/bs)*bs,dir=0;
  for(let i=1;i<closes.length;i++){
    const p=closes[i];
    while(p>=base+bs*2&&dir>=0){base+=bs;bricks.push({o:base-bs,c:base,type:"up"});dir=1}
    while(p>=base+bs&&dir<=0){base+=bs;bricks.push({o:base-bs,c:base,type:"up"});dir=1}
    while(p<=base-bs*2&&dir<=0){base-=bs;bricks.push({o:base+bs,c:base,type:"down"});dir=-1}
    while(p<=base-bs&&dir>=0){base-=bs;bricks.push({o:base+bs,c:base,type:"down"});dir=-1}
  }
  if(!bricks.length)return{bricks,trend:"NEUTRAL",signal:0};
  const last5=bricks.slice(-5);
  const ups=last5.filter(b=>b.type==="up").length;
  const trend=ups>=4?"STRONG UP":ups>=3?"UP":ups<=1?"STRONG DOWN":ups<=2?"DOWN":"NEUTRAL";
  const signal=ups>=4?2:ups>=3?1:ups<=1?-2:ups<=2?-1:0;
  return{bricks:bricks.slice(-40),trend,signal};
}

// ─── POINT & FIGURE BUILDER ────────────────────────────────
function buildPnF(closes,boxSize,reversal){
  if(!closes||closes.length<5)return{columns:[],trend:"NEUTRAL",signal:0};
  const box=boxSize||CFG.pnfBoxSize,rev=reversal||CFG.pnfReversal;
  let columns=[],curCol={type:"X",boxes:[]},curHigh,curLow;
  const startBox=Math.floor(closes[0]/box)*box;
  curCol={type:"X",boxes:[startBox]};curHigh=startBox;curLow=startBox;
  for(let i=1;i<closes.length;i++){
    const p=closes[i];
    if(curCol.type==="X"){
      if(p>=curHigh+box){while(curHigh+box<=p){curHigh+=box;curCol.boxes.push(curHigh)}}
      else if(p<=curHigh-rev*box){columns.push({...curCol});curCol={type:"O",boxes:[]};curLow=curHigh-box;
        for(let b=curLow;b>=p;b-=box){curCol.boxes.push(b);curLow=b}}
    }else{
      if(p<=curLow-box){while(curLow-box>=p){curLow-=box;curCol.boxes.push(curLow)}}
      else if(p>=curLow+rev*box){columns.push({...curCol});curCol={type:"X",boxes:[]};curHigh=curLow+box;
        for(let b=curHigh;b<=p;b+=box){curCol.boxes.push(b);curHigh=b}}
    }
  }
  if(curCol.boxes.length)columns.push(curCol);
  const cols=columns.slice(-20);
  if(!cols.length)return{columns:cols,trend:"NEUTRAL",signal:0};
  const lastCol=cols[cols.length-1];
  const prevCol=cols.length>1?cols[cols.length-2]:null;
  // Double top breakout / double bottom breakdown
  let signal=0;
  if(lastCol.type==="X"&&prevCol){
    const prevX=cols.filter(c=>c.type==="X").slice(-2);
    if(prevX.length>=2&&Math.max(...prevX[1].boxes)>Math.max(...prevX[0].boxes))signal=1; // Bullish breakout
  }
  if(lastCol.type==="O"&&prevCol){
    const prevO=cols.filter(c=>c.type==="O").slice(-2);
    if(prevO.length>=2&&Math.min(...prevO[1].boxes)<Math.min(...prevO[0].boxes))signal=-1; // Bearish breakdown
  }
  const trend=lastCol.type==="X"&&signal>0?"BULLISH BREAKOUT":lastCol.type==="O"&&signal<0?"BEARISH BREAKDOWN":lastCol.type==="X"?"UP COLUMN":"DOWN COLUMN";
  return{columns:cols,trend,signal};
}

// ─── DRAW RENKO SVG ────────────────────────────────────────
function renkoSVG(bricks,w=300,h=120){
  if(!bricks.length)return'<div style="text-align:center;padding:20px;font-size:10px;color:var(--dm)">Not enough data</div>';
  const prices=bricks.flatMap(b=>[b.o,b.c]);
  const mn=Math.min(...prices),mx=Math.max(...prices),rng=mx-mn||1;
  const bw=Math.min(12,Math.max(4,(w-20)/bricks.length));
  let svg=`<svg width="${w}" height="${h}" style="display:block">`;
  bricks.forEach((b,i)=>{
    const x=5+i*(bw+1);
    const yTop=5+(mx-Math.max(b.o,b.c))/rng*(h-10);
    const yBot=5+(mx-Math.min(b.o,b.c))/rng*(h-10);
    const bh=Math.max(2,yBot-yTop);
    const c=b.type==="up"?"#00e676":"#ff1744";
    svg+=`<rect x="${x}" y="${yTop}" width="${bw}" height="${bh}" fill="${c}" rx="1"/>`;
  });
  svg+=`</svg>`;return svg;
}

// ─── DRAW P&F SVG ──────────────────────────────────────────
function pnfSVG(columns,w=300,h=120){
  if(!columns.length)return'<div style="text-align:center;padding:20px;font-size:10px;color:var(--dm)">Not enough data</div>';
  const allBoxes=columns.flatMap(c=>c.boxes);
  const mn=Math.min(...allBoxes),mx=Math.max(...allBoxes),rng=mx-mn||1;
  const cw=Math.min(14,Math.max(6,(w-20)/columns.length));
  let svg=`<svg width="${w}" height="${h}" style="display:block">`;
  columns.forEach((col,ci)=>{
    const x=5+ci*(cw+2);
    col.boxes.forEach(box=>{
      const y=5+(mx-box)/rng*(h-10);
      const sz=Math.max(4,cw-2);
      if(col.type==="X"){
        svg+=`<line x1="${x}" y1="${y}" x2="${x+sz}" y2="${y+sz}" stroke="#00e676" stroke-width="1.5"/>`;
        svg+=`<line x1="${x+sz}" y1="${y}" x2="${x}" y2="${y+sz}" stroke="#00e676" stroke-width="1.5"/>`;
      }else{
        svg+=`<circle cx="${x+sz/2}" cy="${y+sz/2}" r="${sz/2-1}" fill="none" stroke="#ff1744" stroke-width="1.5"/>`;
      }
    });
  });
  svg+=`</svg>`;return svg;
}

const fmt=n=>typeof n==="number"?n.toLocaleString("en-IN",{maximumFractionDigits:2}):n;

// ─── ANALYSIS ──────────────────────────────────────────────
function analyze(){
  const spot=S.idx==="NIFTY"?S.nSpot:S.bSpot,hist=S.idx==="NIFTY"?S.nHist:S.bHist,chain=S.chain;
  if(hist.length<10)return{score:0,reasons:[],signal:null,analysis:null};
  const _pcr=chain.length?PCR(chain):1,_mp=chain.length?MaxP(chain):spot,_vwap=VWAP(hist),_rsi=RSI(hist);
  const e9=EMA(hist,9),e21=EMA(hist,21),_st=STr(hist);
  const hi=Math.max(...hist.slice(-30)),lo=Math.min(...hist.slice(-30)),pvt=PV(hi,lo,spot);
  let sc=0;const R=[];
  if(_pcr>1.3){sc+=2;R.push({t:`PCR ${_pcr} → heavy put writing (bullish)`,tp:"bull",w:2})}else if(_pcr>1.05){sc+=1;R.push({t:`PCR ${_pcr} → mild put support`,tp:"bull",w:1})}else if(_pcr<.7){sc-=2;R.push({t:`PCR ${_pcr} → heavy call writing (bearish)`,tp:"bear",w:2})}else if(_pcr<.95){sc-=1;R.push({t:`PCR ${_pcr} → mild call pressure`,tp:"bear",w:1})}else{R.push({t:`PCR ${_pcr} → neutral`,tp:"neutral",w:0})}
  const md=spot-_mp;if(md<-80){sc+=1;R.push({t:`${Math.abs(md).toFixed(0)} below max pain ${_mp}`,tp:"bull",w:1})}else if(md>80){sc-=1;R.push({t:`${md.toFixed(0)} above max pain ${_mp}`,tp:"bear",w:1})}else{R.push({t:`Near max pain ${_mp}`,tp:"neutral",w:0})}
  if(_rsi<25){sc+=2;R.push({t:`RSI ${_rsi} → deeply oversold`,tp:"bull",w:2})}else if(_rsi<35){sc+=1;R.push({t:`RSI ${_rsi} → nearing oversold`,tp:"bull",w:1})}else if(_rsi>75){sc-=2;R.push({t:`RSI ${_rsi} → deeply overbought`,tp:"bear",w:2})}else if(_rsi>65){sc-=1;R.push({t:`RSI ${_rsi} → nearing overbought`,tp:"bear",w:1})}else{R.push({t:`RSI ${_rsi} → neutral`,tp:"neutral",w:0})}
  const vd=spot-_vwap;if(vd>30){sc+=1;R.push({t:`${vd.toFixed(0)} above VWAP → buyers`,tp:"bull",w:1})}else if(vd<-30){sc-=1;R.push({t:`${Math.abs(vd).toFixed(0)} below VWAP → sellers`,tp:"bear",w:1})}else{R.push({t:`Near VWAP`,tp:"neutral",w:0})}
  if(_st.trend==="BULLISH"){sc+=1;R.push({t:`Supertrend BULLISH ${_st.value}`,tp:"bull",w:1})}else{sc-=1;R.push({t:`Supertrend BEARISH ${_st.value}`,tp:"bear",w:1})}
  const ed=e9-e21;if(ed>10){sc+=1;R.push({t:`9EMA>${e21} by ${ed.toFixed(0)}`,tp:"bull",w:1})}else if(ed<-10){sc-=1;R.push({t:`9EMA<${e21} by ${Math.abs(ed).toFixed(0)}`,tp:"bear",w:1})}else{R.push({t:`EMAs converging`,tp:"neutral",w:0})}
  const ns=[pvt.s1,pvt.s2].find(s=>Math.abs(spot-s)<25),nr=[pvt.r1,pvt.r2].find(r=>Math.abs(spot-r)<25);
  if(ns){sc+=1;R.push({t:`At support ${ns}`,tp:"bull",w:1})}if(nr){sc-=1;R.push({t:`At resistance ${nr}`,tp:"bear",w:1})}

  // Renko signal (if enabled)
  if(CFG.useRenko&&hist.length>20){
    const renko=buildRenko(hist,CFG.renkoSize);
    if(renko.signal!==0){sc+=renko.signal;R.push({t:`Renko: ${renko.trend} (${renko.signal>0?"bullish":"bearish"})`,tp:renko.signal>0?"bull":"bear",w:Math.abs(renko.signal)})}
    else R.push({t:`Renko: ${renko.trend}`,tp:"neutral",w:0});
  }
  // P&F signal (if enabled)
  if(CFG.usePnF&&hist.length>20){
    const pnf=buildPnF(hist,CFG.pnfBoxSize,CFG.pnfReversal);
    if(pnf.signal!==0){sc+=pnf.signal;R.push({t:`P&F: ${pnf.trend}`,tp:pnf.signal>0?"bull":"bear",w:1})}
    else R.push({t:`P&F: ${pnf.trend}`,tp:"neutral",w:0});
  }

  const a={pcr:_pcr,maxPain:_mp,vwap:_vwap,rsi:_rsi,ema9:e9,ema21:e21,supertrend:_st,pivots:pvt,high:hi,low:lo};
  const lots=getLots();const lot=lots[S.idx]||65,mr=S.capital*.02;let sig=null;
  const now=new Date(),hr=now.getHours(),mn=now.getMinutes(),tok=(hr>9||(hr===9&&mn>=30))&&(hr<14||(hr===14&&mn<=30));
  if(Math.abs(sc)>=CFG.minScore&&tok){
    const dir=sc>0?"BULLISH":"BEARISH",rec=dir==="BULLISH"?S.recCE:S.recPE;
    if(rec&&rec.ltp>0){const ltp=rec.ltp,slP=Math.max(ltp*.3,15),sl=+(ltp-slP).toFixed(2),t1=+(ltp*1.4).toFixed(2),t2=+(ltp*1.7).toFixed(2);
    const rpl=slP*lot,nLots=Math.max(1,Math.floor(mr/rpl));
    sig={dir,tradingsymbol:rec.tradingsymbol,strike:rec.strike,optionType:rec.type,expiry:rec.expiry,entryPrice:ltp,slPrice:sl,slPoints:+slP.toFixed(2),t1Price:t1,t2Price:t2,lots:nLots,lotSize:lot,totalRisk:+(rpl*nLots).toFixed(0),totalReward:+((t1-ltp)*lot*nLots).toFixed(0),rr:+((t1-ltp)/slP).toFixed(1),conf:Math.min(Math.abs(sc),9),volume:rec.volume,oi:rec.oi,spread:rec.spread,reasons:R,spotAtSignal:spot}}
  }
  return{score:sc,reasons:R,signal:sig,analysis:a};
}

function gateSignal(r){
  if(!r.signal)return;const now=Date.now(),dir=r.signal.dir,spot=S.idx==="NIFTY"?S.nSpot:S.bSpot;
  let ok=false,br="";
  if(S.todaySignals.length>=CFG.maxSignals)br="Daily limit ("+S.todaySignals.length+"/"+CFG.maxSignals+")";
  else if(!S.lastSignalDir)ok=true;
  else if(dir!==S.lastSignalDir){if(S.lastSLHitDir===dir&&now-S.lastSLHitTime<9e5)br="SL cooldown "+dir;else ok=true}
  else{const mv=Math.abs(spot-S.lastSignalSpot);if(mv>=50)ok=true;else br="Same dir, "+mv.toFixed(0)+"/50 pts"}
  if(ok){
    const sig={...r.signal,time:new Date().toLocaleTimeString("en-IN"),id:now,outcome:"open",pnl:null};
    S.todaySignals=[sig,...S.todaySignals];S.lastSignalDir=dir;S.lastSignalSpot=spot;
    fetch(B+"/api/signals",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(sig)}).catch(function(){});
    try{var ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=dir==="BULLISH"?880:440;o.type="sine";g.gain.value=0.3;o.start();setTimeout(function(){o.stop();ac.close()},300)}catch(e){}
  }
  if(br)r._blockReason=br;
}
function markOutcome(id,outcome){
  var sig=S.todaySignals.find(function(s){return s.id==id});if(!sig)return;
  sig.outcome=outcome;sig.exit_time=new Date().toLocaleTimeString("en-IN");
  var e=sig.entryPrice,ls=sig.lotSize,lots=sig.lots;
  if(outcome==="sl_hit"){sig.pnl=Math.round((sig.slPrice-e)*lots*ls);S.lastSLHitTime=Date.now();S.lastSLHitDir=sig.dir}
  else if(outcome==="t1_hit")sig.pnl=Math.round((sig.t1Price-e)*lots*ls);
  else if(outcome==="t2_hit")sig.pnl=Math.round((sig.t2Price-e)*lots*ls);
  fetch(B+"/api/signals/update",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:id,outcome:outcome})}).catch(function(){});
  render();
}

function spark(data,w,h){w=w||100;h=h||30;if(!data||data.length<2)return"";var mn=Math.min.apply(null,data),mx=Math.max.apply(null,data),rng=mx-mn||1;var pts=data.map(function(v,i){return(i/(data.length-1))*w+","+(h-((v-mn)/rng)*(h-4)-2)}).join(" ");var c=data[data.length-1]>=data[data.length-2]?"var(--gn)":"var(--rd)";return'<svg width="'+w+'" height="'+h+'"><polyline points="'+pts+'" fill="none" stroke="'+c+'" stroke-width="1.5" stroke-linecap="round"/></svg>'}

// ─── CANDLESTICK CHART ─────────────────────────────────────
function drawCandleChart(candles,elId,w,h){
  w=w||340;h=h||180;var el=document.getElementById(elId);if(!el||!candles||!candles.length)return;
  var c=document.createElement("canvas");c.width=w;c.height=h;el.innerHTML="";el.appendChild(c);
  var ctx=c.getContext("2d");var data=candles.slice(-60);
  var highs=data.map(function(d){return d[2]}),lows=data.map(function(d){return d[3]});
  var maxP=Math.max.apply(null,highs),minP=Math.min.apply(null,lows),rng=maxP-minP||1;
  var bw=Math.max(2,(w-20)/data.length-1),pad=10;
  ctx.strokeStyle="#1a274440";ctx.lineWidth=0.5;
  for(var i=0;i<5;i++){var y=pad+i*(h-2*pad)/4;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();ctx.fillStyle="#5a6a8a";ctx.font="8px monospace";ctx.fillText((maxP-(i/4)*rng).toFixed(0),2,y-2)}
  data.forEach(function(d,i){var o=d[1],hi=d[2],lo=d[3],cl=d[4];var x=pad+i*(bw+1);var yO=pad+(maxP-o)/rng*(h-2*pad),yC=pad+(maxP-cl)/rng*(h-2*pad);var yH=pad+(maxP-hi)/rng*(h-2*pad),yL=pad+(maxP-lo)/rng*(h-2*pad);var bull=cl>=o;ctx.strokeStyle=bull?"#00e676":"#ff1744";ctx.fillStyle=bull?"#00e676":"#ff1744";ctx.beginPath();ctx.moveTo(x+bw/2,yH);ctx.lineTo(x+bw/2,yL);ctx.stroke();ctx.fillRect(x,Math.min(yO,yC),bw,Math.max(1,Math.abs(yC-yO)))});
  // EMA lines
  var closes=data.map(function(d){return d[4]});
  [[9,"#00e5ff"],[21,"#ff9100"]].forEach(function(pair){var n=pair[0],color=pair[1];if(closes.length<n)return;ctx.strokeStyle=color;ctx.lineWidth=1;ctx.beginPath();var started=false;
    closes.forEach(function(_,i){if(i<n-1)return;var sl=closes.slice(0,i+1);var k=2/(n+1);var e=sl.slice(0,n).reduce(function(s,v){return s+v},0)/n;for(var j=n;j<sl.length;j++)e=sl[j]*k+e*(1-k);var x=pad+i*(bw+1)+bw/2,y=pad+(maxP-e)/rng*(h-2*pad);if(!started){ctx.moveTo(x,y);started=true}else ctx.lineTo(x,y)});ctx.stroke()});
}

    o+='<button class="btn" style="width:100%;margin-bottom:8px" onclick="window.open(\''+B+'/admin/login\',\'_blank\')">🔌 Connect Kite</button>';
    o+='<button class="btn" style="width:100%;margin-bottom:8px;background:#ff174420;color:var(--rd);border-color:#ff174440" onclick="adminDisconnect()">⛔ Kill Session</button>';
    o+='<button class="btn" style="width:100%;margin-bottom:8px;color:var(--or)" onclick="S.showSetup=false;S.showConfig=true;render()">⚙ Configuration</button>';
    o+='<div style="padding:10px;border-radius:8px;background:var(--sf);margin-bottom:14px"><div style="font-size:10px;color:var(--dm)">Status</div>';
    o+='<div style="font-size:13px;font-weight:700;color:'+(S.backend&&S.backend.authenticated?"var(--gn)":"var(--rd)")+'">'+(S.backend&&S.backend.authenticated?"✅ Live":"❌ Disconnected")+'</div></div>';
    o+='<button class="btn" style="width:100%;color:var(--dm)" onclick="S.showSetup=false;render()">Close</button>';
    o+='</div></div>';
  }

  // Config modal
  if(S.showConfig){
    o+='<div class="modal" onclick="if(event.target===this){S.showConfig=false;render()}"><div class="modal-box">';
    o+='<div style="font-size:15px;font-weight:700;margin-bottom:14px">⚙ Configuration</div>';
    o+='<div style="font-size:9px;color:var(--dm);margin-bottom:12px">Changes apply immediately</div>';
    o+='<div class="ct">LOT SIZES</div>';
    o+=cfgInput("NIFTY Lot Size",CFG.niftyLot,"CFG.niftyLot=parseInt(this.value)||65;saveCfg()");
    o+=cfgInput("BANKNIFTY Lot Size",CFG.bankniftyLot,"CFG.bankniftyLot=parseInt(this.value)||30;saveCfg()");
    o+='<div class="ct" style="margin-top:12px">SIGNAL SETTINGS</div>';
    o+=cfgInput("Min Score to Fire",CFG.minScore,"CFG.minScore=parseInt(this.value)||5;saveCfg()");
    o+=cfgInput("Max Signals/Day",CFG.maxSignals,"CFG.maxSignals=parseInt(this.value)||2;saveCfg()");
    o+='<div class="ct" style="margin-top:12px">CHART TYPES</div>';
    o+=cfgToggle("Renko Chart",CFG.useRenko,"CFG.useRenko=!CFG.useRenko;saveCfg();render()");
    o+=cfgInput("Renko Brick Size",CFG.renkoSize,"CFG.renkoSize=parseInt(this.value)||20;saveCfg()");
    o+=cfgToggle("Point & Figure",CFG.usePnF,"CFG.usePnF=!CFG.usePnF;saveCfg();render()");
    o+=cfgInput("P&F Box Size",CFG.pnfBoxSize,"CFG.pnfBoxSize=parseInt(this.value)||10;saveCfg()");
    o+=cfgInput("P&F Reversal",CFG.pnfReversal,"CFG.pnfReversal=parseInt(this.value)||3;saveCfg()");
    o+='<button class="btn" style="width:100%;margin-top:14px;color:var(--dm)" onclick="S.showConfig=false;render()">Close</button>';
    o+='</div></div>';
  }

  document.getElementById("app").innerHTML=o;

  // Handle stock tab visibility
  var sc2=document.getElementById("stock-search-container");
  var sr=document.getElementById("stock-results");
  if(S.tab==="stock"){sc2.style.display="block";renderStockResults()}else{sc2.style.display="none";sr.innerHTML=""}
}

function renderStockResults(){
  var sr=document.getElementById("stock-results");if(!sr)return;
  var o="";
  if(S.stockLoading){o='<div style="text-align:center;padding:40px;color:var(--dm)">Analyzing...</div>'}
  else if(S.stockData){
    var sd=S.stockData;
    o+='<div class="cd" style="margin-bottom:10px"><div class="ct">'+sd.symbol+' · '+sd.exchange+'</div>';
    o+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    o+='<div><div style="font-size:22px;font-weight:700">₹'+fmt(sd.ltp)+'</div>';
    var chg=sd.ltp-(sd.ohlc&&sd.ohlc.close||sd.ltp);
    o+='<div style="font-size:10px;color:'+(chg>=0?"var(--gn)":"var(--rd)")+'">'+(chg>=0?"▲":"▼")+' '+Math.abs(chg).toFixed(2)+' ('+(((chg)/(sd.ohlc&&sd.ohlc.close||sd.ltp))*100).toFixed(2)+'%)</div></div>';
    o+='<div style="text-align:right;font-size:9px;color:var(--dm)">O:'+fmt(sd.ohlc&&sd.ohlc.open)+' H:'+fmt(sd.ohlc&&sd.ohlc.high)+'<br>L:'+fmt(sd.ohlc&&sd.ohlc.low)+' V:'+fmt(sd.volume)+'</div></div></div>';

    // Timeframe buttons with proper styling
    o+='<div style="display:flex;gap:6px;margin-bottom:10px">';
    ["intraday","daily","weekly"].forEach(function(tf){
      var label=tf==="intraday"?"15 Min":tf==="daily"?"Daily":"Weekly";
      var isActive=S.stockTF===tf;
      o+='<button class="tf-btn'+(isActive?" active":"")+'" onclick="S.stockTF=\''+tf+'\';renderStockResults()">'+label+'</button>';
    });o+='</div>';

    // Chart
    o+='<div class="chart-box" style="margin-bottom:10px"><div id="sChart" style="width:100%;height:180px"></div></div>';

    // Renko & P&F for stock
    var candles=sd.candles&&sd.candles[S.stockTF]||sd.candles&&sd.candles.daily||[];
    if(candles.length>10){
      var closes=candles.map(function(c){return c[4]});
      var _rsi=RSI(closes),e9=EMA(closes,9),e21=EMA(closes,21),e50=EMA(closes,50),_st=STr(closes);
      var hi=Math.max.apply(null,closes.slice(-20)),lo=Math.min.apply(null,closes.slice(-20)),pvt=PV(hi,lo,closes[closes.length-1]);
      var bullPts=0,bearPts=0;
      if(_rsi<35)bullPts+=2;else if(_rsi>65)bearPts+=2;
      if(e9>e21)bullPts++;else bearPts++;
      if(_st.trend==="BULLISH")bullPts++;else bearPts++;
      if(closes[closes.length-1]>e50)bullPts++;else bearPts++;

      // Add Renko/P&F for stock too
      if(CFG.useRenko){var rk=buildRenko(closes,Math.max(1,Math.round((hi-lo)/20)));if(rk.signal>0)bullPts++;else if(rk.signal<0)bearPts++}
      if(CFG.usePnF){var pf=buildPnF(closes,Math.max(1,Math.round((hi-lo)/30)),3);if(pf.signal>0)bullPts++;else if(pf.signal<0)bearPts++}

      var verdict="HOLD",vc="var(--yl)";
      if(bullPts>=4){verdict="BUY";vc="var(--gn)"}else if(bearPts>=4){verdict="SELL";vc="var(--rd)"}

      o+='<div class="g">';
      o+='<div class="cd"><div class="ct">VERDICT · '+S.stockTF.toUpperCase()+'</div>';
      o+='<div style="font-size:26px;font-weight:800;color:'+vc+'">'+verdict+'</div>';
      o+='<div style="font-size:10px;color:var(--dm);margin-top:4px">Bull:'+bullPts+' Bear:'+bearPts+'</div></div>';
      o+='<div class="cd"><div class="ct">TECHNICALS</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
      o+=mbox("RSI",_rsi,_rsi>70?"OB":_rsi<30?"OS":"OK",_rsi<60&&_rsi>40);
      o+=mbox("Trend",_st.trend,"",_st.trend==="BULLISH");
      o+=mbox("9EMA",fmt(e9),e9>e21?"▲":"▼",e9>e21);
      o+=mbox("50EMA",fmt(e50),closes[closes.length-1]>e50?"Above":"Below",closes[closes.length-1]>e50);
      o+='</div></div>';

      // Renko & P&F for stock
      if(CFG.useRenko){var rk2=buildRenko(closes,Math.max(1,Math.round((hi-lo)/20)));o+='<div class="cd"><div class="ct">RENKO · '+rk2.trend+'</div>'+renkoSVG(rk2.bricks,280,90)+'</div>'}
      if(CFG.usePnF){var pf2=buildPnF(closes,Math.max(1,Math.round((hi-lo)/30)),3);o+='<div class="cd"><div class="ct">P&F · '+pf2.trend+'</div>'+pnfSVG(pf2.columns,280,90)+'</div>'}

      o+='<div class="cd"><div class="ct">LEVELS</div><div style="display:grid;gap:3px">';
      [["R2",pvt.r2,"var(--rd)"],["R1",pvt.r1,"#ff8a80"],["PP",pvt.pp,"var(--yl)"],["S1",pvt.s1,"#69f0ae"],["S2",pvt.s2,"var(--gn)"]].forEach(function(x){o+='<div style="display:flex;justify-content:space-between;padding:3px 8px;border-radius:4px;background:var(--sf);font-size:10px"><span style="color:'+x[2]+';font-weight:700">'+x[0]+'</span><span>₹'+fmt(x[1])+'</span></div>'});
      o+='</div></div></div>';
    }
  }else{
    
    // Nifty 50 Scanner section
    if(!S.stockData){
      o+='<div class="cd" style="margin-bottom:10px"><div class="ct">📊 NIFTY 50 SCANNER</div>';
      if(S.scanLoading)o+='<div style="text-align:center;padding:20px;color:var(--dm)">Scanning 50 stocks...</div>';
      else if(S.scanData&&S.scanData.top_buys&&S.scanData.top_buys.length){
        o+='<div style="font-size:9px;color:var(--dm);margin-bottom:8px">Last scan: '+(S.scanData.last_scan?new Date(S.scanData.last_scan).toLocaleTimeString("en-IN"):"—")+' · '+S.scanData.total_scanned+' stocks</div>';
        // Top Buys
        if(S.scanData.top_buys.length){
          o+='<div style="font-size:10px;color:var(--gn);font-weight:700;margin-bottom:6px">🟢 TOP BUYS</div>';
          S.scanData.top_buys.forEach(function(p){
            var sc=p.score,vc=sc>=3?"var(--gn)":"#69f0ae";
            o+='<div style="padding:10px;border-radius:8px;background:var(--sf);border-left:3px solid var(--gn);margin-bottom:6px;cursor:pointer" onclick="document.getElementById(\'stock-input\').value=\''+p.symbol+'\';doStockSearch()">';
            o+='<div style="display:flex;justify-content:space-between;align-items:center">';
            o+='<div><div style="font-size:12px;font-weight:700">'+p.symbol+'</div><div style="font-size:10px;color:var(--dm)">₹'+fmt(p.ltp)+' <span style="color:'+(p.change>=0?"var(--gn)":"var(--rd)")+'">'+(p.change>=0?"+":"")+p.change+'%</span></div></div>';
            o+='<div style="text-align:right"><div style="font-size:11px;font-weight:700;color:'+vc+'">'+p.verdict+'</div><div style="font-size:9px;color:var(--dm)">Score:'+p.score+' RSI:'+p.rsi+'</div></div></div>';
            o+='<div style="display:flex;gap:8px;margin-top:6px;font-size:9px;color:var(--dm)">';
            o+='<span>Entry: <b style="color:var(--tx)">₹'+fmt(p.entry)+'</b></span>';
            o+='<span>SL: <b style="color:var(--rd)">₹'+fmt(p.sl)+'</b></span>';
            o+='<span>T1: <b style="color:var(--gn)">₹'+fmt(p.t1)+'</b></span>';
            o+='<span>T2: <b style="color:var(--gn)">₹'+fmt(p.t2)+'</b></span></div></div>';
          });
        }
        // Top Sells
        if(S.scanData.top_sells&&S.scanData.top_sells.length){
          o+='<div style="font-size:10px;color:var(--rd);font-weight:700;margin:10px 0 6px">🔴 TOP SELLS</div>';
          S.scanData.top_sells.forEach(function(p){
            o+='<div style="padding:10px;border-radius:8px;background:var(--sf);border-left:3px solid var(--rd);margin-bottom:6px;cursor:pointer" onclick="document.getElementById(\'stock-input\').value=\''+p.symbol+'\';doStockSearch()">';
            o+='<div style="display:flex;justify-content:space-between;align-items:center">';
            o+='<div><div style="font-size:12px;font-weight:700">'+p.symbol+'</div><div style="font-size:10px;color:var(--dm)">₹'+fmt(p.ltp)+' <span style="color:'+(p.change>=0?"var(--gn)":"var(--rd)")+'">'+(p.change>=0?"+":"")+p.change+'%</span></div></div>';
            o+='<div style="text-align:right"><div style="font-size:11px;font-weight:700;color:var(--rd)">'+p.verdict+'</div><div style="font-size:9px;color:var(--dm)">Score:'+p.score+' RSI:'+p.rsi+'</div></div></div>';
            o+='<div style="display:flex;gap:8px;margin-top:6px;font-size:9px;color:var(--dm)">';
            o+='<span>Entry: <b style="color:var(--tx)">₹'+fmt(p.entry)+'</b></span>';
            o+='<span>SL: <b style="color:var(--rd)">₹'+fmt(p.sl)+'</b></span>';
            o+='<span>T1: <b style="color:var(--gn)">₹'+fmt(p.t1)+'</b></span></div></div>';
          });
        }
        if(S.isAdmin)o+='<button class="btn-sm" style="width:100%;margin-top:8px;color:var(--ac)" onclick="triggerScan()">↻ Rescan Now</button>';
      }else{
        o+='<div style="text-align:center;padding:20px"><div style="font-size:10px;color:var(--dm)">Scanner runs every 5 min during market hours</div>';
        if(S.isAdmin)o+='<button class="btn-sm" style="margin-top:8px;color:var(--ac)" onclick="triggerScan()">▶ Run Scan Now</button>';
        o+='</div>';
      }
      o+='</div>';
      o+='<div style="font-size:10px;color:var(--dm);margin-bottom:8px;text-align:center">— or search any stock below —</div>';
    }

    o+='<div style="text-align:center;padding:40px"><div style="font-size:28px;margin-bottom:8px">🔍</div><div style="font-size:12px;color:var(--dm)">Search any NSE stock</div><div style="font-size:10px;color:var(--dm);margin-top:4px">RELIANCE, TCS, INFY, HDFCBANK...</div></div>';
  }
  sr.innerHTML=o;

  // Draw chart after DOM update
  if(S.stockData){
    var candles2=S.stockData.candles&&S.stockData.candles[S.stockTF]||S.stockData.candles&&S.stockData.candles.daily||[];
    if(candles2.length){var el=document.getElementById("sChart");if(el)setTimeout(function(){drawCandleChart(candles2,"sChart",el.parentElement.offsetWidth-16,180)},50)}
  }
}

function switchTab(t){S.tab=t;render();if(t==="signals")loadHistory();if(t==="stock"){loadScanner();setTimeout(function(){var inp=document.getElementById("stock-input");if(inp)inp.focus()},100)}}

function lv(l,v,c){return'<div class="lv"><div style="font-size:7px;color:var(--dm);margin-bottom:1px">'+l+'</div><div style="font-size:11px;font-weight:700;color:'+c+';word-break:break-all">'+v+'</div></div>'}
function mbox(l,v,s,g){var c=g?"var(--gn)":"var(--rd)";return'<div class="mb" style="border-left-color:'+c+'"><div style="font-size:8px;color:var(--dm)">'+l+'</div><div style="font-size:12px;font-weight:700;color:'+c+'">'+v+'</div><div style="font-size:8px;color:var(--dm)">'+s+'</div></div>'}
function rl(items){var o='<div style="display:grid;gap:3px">';items.forEach(function(t,i){o+='<div style="display:flex;gap:6px;padding:4px 6px;border-radius:4px;background:var(--sf);font-size:9px"><span style="color:var(--ac);font-weight:700;flex-shrink:0">'+String(i+1).padStart(2,"0")+'</span><span>'+t+'</span></div>'});return o+'</div>'}
function cfgInput(label,val,onchange){return'<div class="cfg-row"><span style="font-size:10px;color:var(--tx)">'+label+'</span><input class="cfg-input" type="number" value="'+val+'" onchange="'+onchange+'"></div>'}
function cfgToggle(label,isOn,onclick){return'<div class="cfg-row"><span style="font-size:10px;color:var(--tx)">'+label+'</span><button class="cfg-toggle '+(isOn?"on":"off")+'" onclick="'+onclick+'"></button></div>'}

// ─── BOOT ──────────────────────────────────────────────────
checkBackend();loadHistory();S.result=analyze();render();
setInterval(tick,S.mode==="mock"?3000:8000);
document.getElementById("stock-input").addEventListener("keydown",function(e){if(e.key==="Enter")doStockSearch()});
</script>
</body>
</html>
