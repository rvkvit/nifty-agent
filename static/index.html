<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nifty Trading Agent — Smart Gating</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a10;--sf:#0c1220;--cd:#111a2e;--bd:#1a2744;--ac:#00e5ff;--gn:#00e676;--rd:#ff1744;--yl:#ffc400;--tx:#e4eaf6;--dm:#5a6a8a;--bl:#448aff}
body{font-family:'IBM Plex Mono','Fira Code',monospace;background:var(--bg);color:var(--tx);min-height:100vh;padding:16px}
button{font-family:inherit;cursor:pointer}
.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}
.cd{padding:16px;border-radius:12px;background:var(--cd);border:1px solid var(--bd)}
.ct{font-size:9px;font-weight:700;color:var(--dm);letter-spacing:1.5px;margin-bottom:12px}
.sf{background:var(--sf)}.bd{border:1px solid var(--bd)}
.pill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.btn{padding:7px 12px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--ac);font-weight:600;font-size:10px}
.lv{padding:8px;border-radius:6px;background:var(--sf)}.lv-l{font-size:8px;color:var(--dm);letter-spacing:.5px;margin-bottom:2px}.lv-v{font-weight:700;word-break:break-all}
.mb{padding:8px;border-radius:8px;background:var(--sf);border-left:3px solid}
.rl{display:flex;gap:8px;padding:5px 8px;border-radius:5px;background:var(--sf);font-size:10px}
.fc{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;background:var(--sf);border-left:3px solid}
table{width:100%;border-collapse:collapse;font-size:10px}
th{padding:7px 6px;font-size:9px;font-weight:600;background:var(--sf)}td{padding:4px 6px}
.s2{grid-column:1/-1}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.pulse{animation:pulse 2s infinite}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:grid;place-items:center;z-index:999}
</style>
</head>
<body>
<div id="app"></div>
<script>
const BACKEND=window.location.origin,LOTS={NIFTY:25,BANKNIFTY:15};
// ─── STATE ─────────────────────────────────────────────────
let S={mode:"mock",idx:"NIFTY",nSpot:22235,bSpot:53200,
nHist:[22180,22190,22200,22210,22195,22205,22220,22215,22230,22225,22240,22235,22220,22230,22235],
bHist:[53e3,53050,53100,53080,53120,53150,53130,53170,53200,53180,53160,53190,53220,53210,53200],
chain:[],result:null,todaySignals:[],lastSignalTime:0,lastSignalDir:null,lastSignalSpot:0,
lastSLHitTime:0,lastSLHitDir:null,recCE:null,recPE:null,tab:"dashboard",capital:2e5,tick:0,
backend:null,showSetup:false};

// ─── TECHNICALS ────────────────────────────────────────────
const PCR=c=>{const p=c.reduce((s,r)=>s+(r.pe?.oi||0),0),q=c.reduce((s,r)=>s+(r.ce?.oi||0),0);return q?+(p/q).toFixed(2):0};
const MP=c=>{let m=c[0]?.strike||0,v=1/0;c.forEach(({strike:s})=>{let p=0;c.forEach(r=>{if(s>r.strike)p+=(r.ce?.oi||0)*(s-r.strike);if(s<r.strike)p+=(r.pe?.oi||0)*(r.strike-s)});if(p<v){v=p;m=s}});return m};
const VWAP=p=>p.length?+(p.reduce((s,v)=>s+v,0)/p.length).toFixed(2):0;
const RSI=(p,n=14)=>{if(p.length<n+1)return 50;let g=0,l=0;for(let i=p.length-n;i<p.length;i++){const d=p[i]-p[i-1];d>0?g+=d:l-=d}const a=g/n,b=l/n;return b===0?100:+(100-100/(1+a/b)).toFixed(1)};
const EMA=(p,n)=>{if(p.length<n)return p[p.length-1]||0;const k=2/(n+1);let e=p.slice(0,n).reduce((s,v)=>s+v,0)/n;for(let i=n;i<p.length;i++)e=p[i]*k+e*(1-k);return+e.toFixed(2)};
const ST=(p,f=2,n=10)=>{if(p.length<n)return{value:p[p.length-1],trend:"BULLISH"};const a=p.slice(-n).reduce((s,_,i,a)=>i?s+Math.abs(a[i]-a[i-1]):s,0)/(n-1);const l=p[p.length-1],lo=l-f*a;return l>lo?{value:+lo.toFixed(2),trend:"BULLISH"}:{value:+(l+f*a).toFixed(2),trend:"BEARISH"}};
const PV=(h,l,c)=>{const pp=+((h+l+c)/3).toFixed(2);return{r3:+(h+2*(pp-l)).toFixed(2),r2:+(pp+(h-l)).toFixed(2),r1:+(2*pp-l).toFixed(2),pp,s1:+(2*pp-h).toFixed(2),s2:+(pp-(h-l)).toFixed(2),s3:+(l-2*(h-pp)).toFixed(2)}};
const fmt=n=>typeof n==="number"?n.toLocaleString("en-IN",{maximumFractionDigits:2}):n;

// ─── SIGNAL ENGINE ─────────────────────────────────────────
function analyze(){
  const spot=S.idx==="NIFTY"?S.nSpot:S.bSpot;
  const hist=S.idx==="NIFTY"?S.nHist:S.bHist;
  const chain=S.chain,cap=S.capital,idx=S.idx;
  if(hist.length<10)return{score:0,reasons:[],signal:null,analysis:null};
  const _pcr=chain.length?PCR(chain):1,_mp=chain.length?MP(chain):spot,_vwap=VWAP(hist),_rsi=RSI(hist);
  const e9=EMA(hist,9),e21=EMA(hist,21),_st=ST(hist);
  const hi=Math.max(...hist.slice(-30)),lo=Math.min(...hist.slice(-30)),pvt=PV(hi,lo,spot);
  let sc=0;const R=[];
  if(_pcr>1.3){sc+=2;R.push({t:`PCR ${_pcr} → heavy put writing (bullish)`,tp:"bull",w:2})}else if(_pcr>1.05){sc+=1;R.push({t:`PCR ${_pcr} → mild put support`,tp:"bull",w:1})}else if(_pcr<.7){sc-=2;R.push({t:`PCR ${_pcr} → heavy call writing (bearish)`,tp:"bear",w:2})}else if(_pcr<.95){sc-=1;R.push({t:`PCR ${_pcr} → mild call pressure`,tp:"bear",w:1})}else{R.push({t:`PCR ${_pcr} → neutral (0.95-1.05)`,tp:"neutral",w:0})}
  const md=spot-_mp;if(md<-80){sc+=1;R.push({t:`Spot ${Math.abs(md).toFixed(0)} below max pain ${_mp} → pull up`,tp:"bull",w:1})}else if(md>80){sc-=1;R.push({t:`Spot ${md.toFixed(0)} above max pain ${_mp} → pull down`,tp:"bear",w:1})}else{R.push({t:`Near max pain ${_mp} (${md>0?"+":""}${md.toFixed(0)}) → range`,tp:"neutral",w:0})}
  if(_rsi<25){sc+=2;R.push({t:`RSI ${_rsi} → deeply oversold`,tp:"bull",w:2})}else if(_rsi<35){sc+=1;R.push({t:`RSI ${_rsi} → nearing oversold`,tp:"bull",w:1})}else if(_rsi>75){sc-=2;R.push({t:`RSI ${_rsi} → deeply overbought`,tp:"bear",w:2})}else if(_rsi>65){sc-=1;R.push({t:`RSI ${_rsi} → nearing overbought`,tp:"bear",w:1})}else{R.push({t:`RSI ${_rsi} → neutral`,tp:"neutral",w:0})}
  const vd=spot-_vwap;if(vd>30){sc+=1;R.push({t:`Spot ${vd.toFixed(0)} above VWAP → buyers`,tp:"bull",w:1})}else if(vd<-30){sc-=1;R.push({t:`Spot ${Math.abs(vd).toFixed(0)} below VWAP → sellers`,tp:"bear",w:1})}else{R.push({t:`Near VWAP (${vd>0?"+":""}${vd.toFixed(0)}) → no bias`,tp:"neutral",w:0})}
  if(_st.trend==="BULLISH"){sc+=1;R.push({t:`Supertrend BULLISH at ${_st.value}`,tp:"bull",w:1})}else{sc-=1;R.push({t:`Supertrend BEARISH at ${_st.value}`,tp:"bear",w:1})}
  const ed=e9-e21;if(ed>10){sc+=1;R.push({t:`9EMA>${e21} by ${ed.toFixed(0)} → momentum up`,tp:"bull",w:1})}else if(ed<-10){sc-=1;R.push({t:`9EMA<${e21} by ${Math.abs(ed).toFixed(0)} → fading`,tp:"bear",w:1})}else{R.push({t:`EMAs converging (${ed.toFixed(0)})`,tp:"neutral",w:0})}
  const ns=[pvt.s1,pvt.s2].find(s=>Math.abs(spot-s)<25),nr=[pvt.r1,pvt.r2].find(r=>Math.abs(spot-r)<25);
  if(ns){sc+=1;R.push({t:`At support ${ns} → bounce zone`,tp:"bull",w:1})}if(nr){sc-=1;R.push({t:`At resistance ${nr} → rejection`,tp:"bear",w:1})}
  const a={pcr:_pcr,maxPain:_mp,vwap:_vwap,rsi:_rsi,ema9:e9,ema21:e21,supertrend:_st,pivots:pvt,high:hi,low:lo};
  const lot=LOTS[idx]||25,mr=cap*.02;let sig=null;
  const now=new Date(),hr=now.getHours(),mn=now.getMinutes(),tok=(hr>9||(hr===9&&mn>=30))&&(hr<14||(hr===14&&mn<=30));
  if(Math.abs(sc)>=5&&tok){
    const dir=sc>0?"BULLISH":"BEARISH";const rec=dir==="BULLISH"?S.recCE:S.recPE;
    if(rec&&rec.ltp>0){const ltp=rec.ltp,slPts=Math.max(ltp*.3,15),sl=+(ltp-slPts).toFixed(2),t1=+(ltp*1.4).toFixed(2),t2=+(ltp*1.7).toFixed(2);
    const rpl=slPts*lot,lots=Math.max(1,Math.floor(mr/rpl));
    sig={dir,tradingsymbol:rec.tradingsymbol,strike:rec.strike,optionType:rec.type,expiry:rec.expiry,entryPrice:ltp,slPrice:sl,slPoints:+slPts.toFixed(2),t1Price:t1,t2Price:t2,lots,lotSize:lot,totalRisk:+(rpl*lots).toFixed(0),totalReward:+((t1-ltp)*lot*lots).toFixed(0),rr:+((t1-ltp)/slPts).toFixed(1),conf:Math.min(Math.abs(sc),7),volume:rec.volume,oi:rec.oi,spread:rec.spread,reasons:R,spotAtSignal:spot}}
  }
  return{score:sc,reasons:R,signal:sig,analysis:a};
}

// ─── SMART GATING ──────────────────────────────────────────
function gateSignal(r){
  if(!r.signal)return;
  const now=Date.now(),dir=r.signal.dir;let ok=false,br="";
  if(S.todaySignals.length>=2)br="Daily limit (2/2)";
  else if(!S.lastSignalDir)ok=true;
  else if(dir!==S.lastSignalDir){
    if(S.lastSLHitDir===dir&&now-S.lastSLHitTime<9e5)br=`SL cooldown on ${dir} (${Math.max(0,15-Math.round((now-S.lastSLHitTime)/6e4))}m left)`;
    else ok=true;
  }else{const mv=Math.abs((S.idx==="NIFTY"?S.nSpot:S.bSpot)-S.lastSignalSpot);if(mv>=50)ok=true;else br=`Same dir, moved ${mv.toFixed(0)} pts (need 50+)`}
  if(ok){const sig={...r.signal,time:new Date().toLocaleTimeString("en-IN"),id:now};S.todaySignals=[sig,...S.todaySignals];S.lastSignalTime=now;S.lastSignalDir=dir;S.lastSignalSpot=S.idx==="NIFTY"?S.nSpot:S.bSpot}
  if(br)r._blockReason=br;
}

function markSLHit(){const as=S.todaySignals[0];if(as){S.lastSLHitTime=Date.now();S.lastSLHitDir=as.dir;render()}}

// ─── BACKEND ───────────────────────────────────────────────
async function checkBackend(){try{const r=await fetch(`${BACKEND}/api/status`);S.backend=await r.json();if(S.backend.authenticated)S.mode="live"}catch{S.backend=null}render()}
async function fetchLive(){
  if(S.mode!=="live")return;
  try{const r=await fetch(`${BACKEND}/api/market-data/${S.idx}`);const d=await r.json();
  if(d.data){const s=d.data.spot;if(S.idx==="NIFTY"){S.nSpot=s;S.nHist=[...S.nHist.slice(-99),s]}else{S.bSpot=s;S.bHist=[...S.bHist.slice(-99),s]}
  if(d.data.chain?.length)S.chain=d.data.chain;if(d.data.recommended_ce)S.recCE=d.data.recommended_ce;if(d.data.recommended_pe)S.recPE=d.data.recommended_pe}}catch(e){console.error(e)}
}
function tick(){
  if(S.mode==="mock"){S.nSpot=+(S.nSpot+(Math.random()-.48)*12).toFixed(2);S.nHist=[...S.nHist.slice(-99),S.nSpot];S.bSpot=+(S.bSpot+(Math.random()-.48)*30).toFixed(2);S.bHist=[...S.bHist.slice(-99),S.bSpot]}
  else fetchLive();
  S.tick++;const r=analyze();S.result=r;gateSignal(r);render();
}

// ─── SPARKLINE ─────────────────────────────────────────────
function spark(data,w=120,h=35){if(!data||data.length<2)return"";const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*(h-4)-2}`).join(" ");const c=data[data.length-1]>=data[data.length-2]?"var(--gn)":"var(--rd)";return`<svg width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/></svg>`}

// ─── RENDER ────────────────────────────────────────────────
function render(){
  const spot=S.idx==="NIFTY"?S.nSpot:S.bSpot,a=S.result?.analysis,sig=S.result?.signal,sc=S.result?.score||0;
  const as=S.todaySignals[0],step=S.idx==="NIFTY"?50:100;
  const nC=S.nHist.length>1?S.nSpot-S.nHist[S.nHist.length-2]:0,bC=S.bHist.length>1?S.bSpot-S.bHist[S.bHist.length-2]:0;
  const mc=S.mode==="live"?"var(--gn)":"var(--yl)",ml=S.mode==="live"?"● LIVE":"● MOCK";

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div style="display:flex;align-items:center;gap:12px"><div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--ac),var(--bl));display:grid;place-items:center;font-size:17px;font-weight:800;color:var(--bg);box-shadow:0 0 20px #00e5ff40">N</div>
    <div><div style="font-size:14px;font-weight:700;letter-spacing:1px">NIFTY TRADING AGENT</div><div style="font-size:9px;color:var(--dm);letter-spacing:2px">SMART GATING · MAX 2/DAY · EXACT OPTIONS</div></div></div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="pill ${S.mode==="live"?"pulse":""}" style="background:${mc}18;color:${mc};border:1px solid ${mc}35">${ml}</span>
      <span class="pill" style="background:var(--ac)18;color:var(--ac);border:1px solid #00e5ff35">Signals: ${S.todaySignals.length}/2</span>
      <button class="btn" onclick="S.showSetup=true;render()">⚙</button>
      <button class="btn" style="color:var(--dm)" onclick="checkBackend()">↻</button>
    </div></div>`;

  // Index cards
  h+=`<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">`;
  [["NIFTY",S.nSpot,S.nHist,nC],["BANKNIFTY",S.bSpot,S.bHist,bC]].forEach(([n,sp,hi,ch])=>{
    const ac=S.idx===n;h+=`<button onclick="S.idx='${n}';render()" style="flex:1;min-width:200px;padding:10px 14px;border-radius:10px;background:${ac?"var(--cd)":"var(--sf)"};border:1px solid ${ac?"#00e5ff50":"var(--bd)"};display:flex;justify-content:space-between;align-items:center;cursor:pointer">
    <div style="text-align:left"><div style="font-size:10px;color:${ac?"var(--ac)":"var(--dm)"};font-weight:700;letter-spacing:1.5px">${n}</div><div style="font-size:20px;font-weight:700">${fmt(sp)}</div><div style="font-size:11px;color:${ch>=0?"var(--gn)":"var(--rd)"};font-weight:600">${ch>=0?"▲":"▼"} ${Math.abs(ch).toFixed(2)}</div></div>
    ${spark(hi.slice(-30))}</button>`;
  });h+=`</div>`;

  // Tabs
  h+=`<div style="display:flex;gap:2px;margin-bottom:14px;background:var(--sf);border-radius:10px;padding:4px">`;
  [["dashboard","Dashboard"],["signals","Today's Signals"],["chain","Option Chain"],["rules","Rules"]].forEach(([id,l])=>{
    h+=`<button onclick="S.tab='${id}';render()" style="flex:1;padding:7px 10px;border-radius:8px;font-size:11px;font-weight:600;border:none;background:${S.tab===id?"var(--cd)":"transparent"};color:${S.tab===id?"var(--ac)":"var(--dm)"};cursor:pointer">${l}</button>`;
  });h+=`</div>`;

  // ═══ DASHBOARD ═══
  if(S.tab==="dashboard"&&a){
    const sC=sc>=3?"var(--gn)":sc>=1?"#69f0ae":sc<=-3?"var(--rd)":sc<=-1?"#ff8a80":"var(--yl)";
    const asGlow=as?(as.dir==="BULLISH"?"#00e676":"#ff1744"):null;

    h+=`<div class="g">`;
    // Main Signal Card
    h+=`<div class="cd s2" style="${asGlow?`border-color:${asGlow}35;box-shadow:0 0 20px ${asGlow}10`:""}"><div class="ct">${as?`🎯 ACTIVE — ${as.tradingsymbol}`:"🎯 SIGNAL STATUS"}</div>`;
    if(as){
      const dc=as.dir==="BULLISH"?"var(--gn)":"var(--rd)";
      h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <span style="padding:6px 16px;border-radius:8px;font-size:15px;font-weight:800;background:${dc}20;color:${dc};border:1px solid ${dc}40">${as.dir==="BULLISH"?"▲ BUY":"▼ BUY"} ${as.tradingsymbol}</span>
        <span style="display:flex;gap:3px">${Array.from({length:7}).map((_,i)=>`<div style="width:7px;height:16px;border-radius:2px;background:${i<as.conf?dc:"var(--sf)"}"></div>`).join("")}</span>
        <span style="font-size:10px;color:var(--dm)">${as.conf}/7 · ${as.time}</span></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px">
          ${lv("OPTION",as.tradingsymbol,"var(--ac)",1)}${lv("STRIKE",as.strike+" "+as.optionType,"var(--tx)")}${lv("EXPIRY",as.expiry,"var(--dm)")}
          ${lv("ENTRY PRICE","₹"+fmt(as.entryPrice),"var(--tx)",1)}${lv("⛔ STOP LOSS","₹"+fmt(as.slPrice),"var(--rd)",1)}${lv("🎯 TARGET 1 (50%)","₹"+fmt(as.t1Price),"var(--gn)",1)}
          ${lv("🎯 TARGET 2 (trail)","₹"+fmt(as.t2Price),"var(--gn)")}${lv("LOTS",as.lots,"var(--ac)")}${lv("LOT SIZE",as.lotSize,"var(--dm)")}
          ${lv("MAX RISK","₹"+fmt(as.totalRisk),"var(--rd)")}${lv("REWARD","₹"+fmt(as.totalReward),"var(--gn)")}${lv("R:R","1 : "+as.rr,"var(--ac)")}
        </div>
        <div style="margin-top:12px;padding:10px;border-radius:8px;background:var(--sf);font-size:10px;color:var(--dm)">OI: ${fmt(as.oi)} · Vol: ${fmt(as.volume)} · Spread: ₹${as.spread} · Spot@signal: ${fmt(as.spotAtSignal)}</div>
        <div style="margin-top:10px;display:flex;gap:8px">
          <button class="btn" style="flex:1;background:#ff174420;color:var(--rd);border-color:#ff174440" onclick="markSLHit()">⛔ SL Hit — Mark Loss</button>
          <button class="btn" style="flex:1;background:#00e67620;color:var(--gn);border-color:#00e67640">✅ Target Hit</button>
        </div>`;
    }else{
      h+=`<div style="text-align:center;padding:30px 16px">
        <div style="font-size:36px;margin-bottom:10px">${Math.abs(sc)>=5?"⚡":Math.abs(sc)>=3?"⏳":"⏸"}</div>
        <div style="font-size:15px;font-weight:600;color:var(--dm)">${Math.abs(sc)>=5?"Signal conditions met!":Math.abs(sc)>=3?"Building... "+Math.abs(sc)+"/5 aligned":"Scanning — need 5+ factors"}</div>
        <div style="font-size:11px;color:var(--dm);margin-top:6px">Score: ${sc}/7 · ${S.todaySignals.length}/2 used</div>`;
      if(S.result?._blockReason)h+=`<div style="margin-top:8px;padding:6px 12px;border-radius:6px;background:#ffc40015;border:1px solid #ffc40030;font-size:10px;color:var(--yl)">🚫 Blocked: ${S.result._blockReason}</div>`;
      if(S.lastSLHitDir&&Date.now()-S.lastSLHitTime<9e5)h+=`<div style="margin-top:6px;padding:6px 12px;border-radius:6px;background:#ff174415;border:1px solid #ff174430;font-size:10px;color:var(--rd)">⛔ SL cooldown ${S.lastSLHitDir} — ${Math.max(0,15-Math.round((Date.now()-S.lastSLHitTime)/6e4))}m left</div>`;
      if(S.lastSignalDir)h+=`<div style="margin-top:6px;font-size:10px;color:var(--dm)">Last: ${S.lastSignalDir} at ${fmt(S.lastSignalSpot)} · Same-dir needs 50+ pt · Reversal OK</div>`;
      h+=`<div style="margin-top:10px;display:flex;justify-content:center;gap:4px">${Array.from({length:7}).map((_,i)=>{const f=i<Math.abs(sc);return`<div style="width:24px;height:6px;border-radius:3px;background:${f?(sc>0?"var(--gn)":sc<0?"var(--rd)":"var(--dm)"):"var(--sf)"};transition:all .3s"></div>`}).join("")}</div></div>`;
    }
    h+=`</div>`;

    // Recommended Options
    h+=`<div class="cd"><div class="ct">RECOMMENDED OPTIONS</div>`;
    if(S.recCE||S.recPE){
      if(S.recCE)h+=`<div style="padding:10px;border-radius:8px;background:var(--sf);border-left:3px solid var(--gn);margin-bottom:8px"><div style="font-size:9px;color:var(--gn);font-weight:700;margin-bottom:4px">FOR BULLISH</div><div style="font-size:14px;font-weight:700">${S.recCE.tradingsymbol}</div><div style="font-size:10px;color:var(--dm);margin-top:4px">₹${S.recCE.ltp} · OI:${fmt(S.recCE.oi)} · Vol:${fmt(S.recCE.volume)} · Spd:₹${S.recCE.spread}</div></div>`;
      if(S.recPE)h+=`<div style="padding:10px;border-radius:8px;background:var(--sf);border-left:3px solid var(--rd)"><div style="font-size:9px;color:var(--rd);font-weight:700;margin-bottom:4px">FOR BEARISH</div><div style="font-size:14px;font-weight:700">${S.recPE.tradingsymbol}</div><div style="font-size:10px;color:var(--dm);margin-top:4px">₹${S.recPE.ltp} · OI:${fmt(S.recPE.oi)} · Vol:${fmt(S.recPE.volume)} · Spd:₹${S.recPE.spread}</div></div>`;
    }else h+=`<div style="font-size:11px;color:var(--dm);text-align:center;padding:20px">${S.mode==="live"?"Loading...":"Connect Zerodha for live options"}</div>`;
    h+=`</div>`;

    // Metrics
    h+=`<div class="cd"><div class="ct">MARKET CONDITION</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${mbox("PCR",a.pcr,a.pcr>1.3?"Bullish":a.pcr<.7?"Bearish":"Neutral",a.pcr>1)}
      ${mbox("RSI",a.rsi,a.rsi>70?"Overbought!":a.rsi<30?"Oversold!":"Normal",a.rsi<60&&a.rsi>40)}
      ${mbox("VWAP",fmt(a.vwap),spot>a.vwap?"Above ▲":"Below ▼",spot>a.vwap)}
      ${mbox("Max Pain",fmt(a.maxPain),"Gap:"+(spot-a.maxPain).toFixed(0),Math.abs(spot-a.maxPain)<50)}
      ${mbox("Supertrend",a.supertrend.trend,fmt(a.supertrend.value),a.supertrend.trend==="BULLISH")}
      ${mbox("EMA",a.ema9>a.ema21?"BULL":"BEAR","9E:"+fmt(a.ema9),a.ema9>a.ema21)}
    </div></div>`;

    // Factors
    h+=`<div class="cd s2"><div class="ct">FACTOR ANALYSIS</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:5px">`;
    (S.result?.reasons||[]).forEach(r=>{const c=r.tp==="bull"?"var(--gn)":r.tp==="bear"?"var(--rd)":"var(--yl)";h+=`<div class="fc" style="border-left-color:${c}"><span style="color:${c};font-weight:700;font-size:14px;width:16px">${r.tp==="bull"?"▲":r.tp==="bear"?"▼":"●"}</span><span style="font-size:10px;flex:1">${r.t}</span><span style="font-size:9px;color:var(--dm);font-weight:700">wt:${r.w}</span></div>`});
    h+=`</div></div>`;

    // Position
    h+=`<div class="cd"><div class="ct">POSITION SIZING</div><div style="display:grid;gap:6px">
      <div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--dm)">Capital</span><span style="color:var(--ac);font-weight:700">₹${fmt(S.capital)}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--dm)">Max Risk (2%)</span><span style="color:var(--rd);font-weight:700">₹${fmt(S.capital*.02)}</span></div>
      <div style="display:flex;gap:6px;margin-top:6px">${[1e5,2e5,3e5,5e5].map(c=>`<button style="flex:1;padding:5px;border-radius:6px;font-size:10px;font-weight:600;background:${S.capital===c?"#00e5ff20":"var(--sf)"};color:${S.capital===c?"var(--ac)":"var(--dm)"};border:1px solid ${S.capital===c?"#00e5ff40":"var(--bd)"};cursor:pointer" onclick="S.capital=${c};render()">₹${c/1e5}L</button>`).join("")}</div>
    </div></div>`;
    h+=`</div>`;
  }

  // ═══ SIGNALS ═══
  if(S.tab==="signals"){
    h+=`<div style="font-size:11px;color:var(--dm);margin-bottom:14px">Max 2/day · Same-dir needs 50pt move · Reversals allowed · 15min SL cooldown</div>`;
    if(!S.todaySignals.length)h+=`<div style="text-align:center;padding:50px"><div style="font-size:40px;margin-bottom:10px">📡</div><div style="font-size:14px;color:var(--dm)">No signals yet today.</div></div>`;
    else S.todaySignals.forEach(s=>{
      const dc=s.dir==="BULLISH"?"var(--gn)":"var(--rd)";
      h+=`<div style="padding:16px;border-radius:12px;background:var(--cd);border-left:5px solid ${dc};border:1px solid ${dc}30;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:16px;font-weight:800;color:${dc}">${s.dir==="BULLISH"?"▲":"▼"} BUY ${s.tradingsymbol}</span>
          <span style="font-size:10px;color:var(--dm)">${s.time} · Conf ${s.conf}/7</span></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px">
          ${lv("ENTRY","₹"+fmt(s.entryPrice),"var(--tx)")}${lv("SL","₹"+fmt(s.slPrice),"var(--rd)")}${lv("T1","₹"+fmt(s.t1Price),"var(--gn)")}${lv("T2","₹"+fmt(s.t2Price),"var(--gn)")}
          ${lv("LOTS",s.lots,"var(--ac)")}${lv("RISK","₹"+fmt(s.totalRisk),"var(--rd)")}${lv("REWARD","₹"+fmt(s.totalReward),"var(--gn)")}${lv("R:R","1:"+s.rr,"var(--ac)")}
        </div></div>`;
    });
  }

  // ═══ CHAIN ═══
  if(S.tab==="chain"){
    const atm=Math.round(spot/step)*step;
    h+=`<div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:11px;flex-wrap:wrap;gap:8px">
      <span>PCR: <b style="color:${a?.pcr>1?"var(--gn)":"var(--rd)"}">${a?.pcr}</b></span>
      <span>Max Pain: <b style="color:var(--yl)">${fmt(a?.maxPain)}</b></span>
      <span>ATM: <b style="color:var(--ac)">${fmt(atm)}</b></span></div>`;
    h+=`<div style="border-radius:10px;overflow:hidden;border:1px solid var(--bd)"><table>
      <thead><tr>${["CE OI","CE Chg","CE LTP"].map(x=>`<th style="text-align:right;color:#00e67690">${x}</th>`).join("")}<th style="text-align:center;color:var(--ac)">STRIKE</th>${["PE LTP","PE Chg","PE OI"].map(x=>`<th style="text-align:left;color:#ff174490">${x}</th>`).join("")}</tr></thead><tbody>`;
    (S.chain||[]).forEach(r=>{const ia=r.strike===atm;
      h+=`<tr style="background:${ia?"#00e5ff08":"transparent"};border-bottom:1px solid var(--bd)">
        <td style="text-align:right">${((r.ce?.oi||0)/1e3).toFixed(1)}K</td>
        <td style="text-align:right;color:${(r.ce?.oiChange||0)>0?"var(--gn)":"var(--rd)"}">${(r.ce?.oiChange||0)>0?"+":""}${((r.ce?.oiChange||0)/1e3).toFixed(1)}K</td>
        <td style="text-align:right;font-weight:600">${(r.ce?.ltp||0).toFixed(1)}</td>
        <td style="text-align:center;font-weight:800;color:${ia?"var(--ac)":"var(--tx)"}">${r.strike}</td>
        <td style="font-weight:600">${(r.pe?.ltp||0).toFixed(1)}</td>
        <td style="color:${(r.pe?.oiChange||0)>0?"var(--gn)":"var(--rd)"}">${(r.pe?.oiChange||0)>0?"+":""}${((r.pe?.oiChange||0)/1e3).toFixed(1)}K</td>
        <td>${((r.pe?.oi||0)/1e3).toFixed(1)}K</td></tr>`;
    });h+=`</tbody></table></div>`;
  }

  // ═══ RULES ═══
  if(S.tab==="rules"){
    h+=`<div class="g">
      <div class="cd"><div class="ct">🔌 SETUP</div>${rl(["Run: python kite_server.py","Login: http://127.0.0.1:5000/login","Don't refresh Auth page","Open dashboard, click ↻","Backend: "+(S.backend?.authenticated?"✅ LIVE":S.backend?"⚡ Need login":"❌ Not running")])}</div>
      <div class="cd"><div class="ct">⚡ SIGNAL RULES</div>${rl(["5+ of 7 factors must align","Max 2 signals/day","Same direction: needs 50+ pt spot move","Reversal: allowed immediately","After SL: same dir blocked 15min, opposite OK","No signals 9:15-9:30 or after 2:30 PM","Exact option name + premium-based SL/targets"])}</div>
      <div class="cd"><div class="ct">🎯 HOW TO TRADE</div>${rl(["Wait for signal on Dashboard","Note exact tradingsymbol","Open Kite → search symbol → BUY market","Place SL order at shown SL price","Target 1: sell 50% lots","Move SL to breakeven","Target 2: exit fully or trail SL ₹5 below","Hard exit 3:15 PM"])}</div>
      <div class="cd"><div class="ct">🛡 RISK</div>${rl(["MAX 2% capital per trade","NEVER average losers","STOP after 2 losses","Miss by ₹10+ → skip","No revenge trades","Paper trade 1-2 weeks first"])}</div>
    </div>`;
  }

  // Modal
  if(S.showSetup){
    h+=`<div class="modal" onclick="if(event.target===this){S.showSetup=false;render()}"><div style="background:var(--cd);border:1px solid var(--bd);border-radius:14px;padding:24px;width:400px;max-width:90vw">
      <div style="font-size:15px;font-weight:700;margin-bottom:14px">Setup</div>
      <div style="font-size:11px;color:var(--dm);line-height:1.8;margin-bottom:14px">1. <code style="background:var(--sf);padding:1px 5px;border-radius:3px">python kite_server.py</code><br>2. <a href="http://127.0.0.1:5000/login" target="_blank" style="color:var(--ac)">Login Zerodha</a><br>3. Close auth tab, click Check</div>
      <div style="padding:10px;border-radius:8px;background:var(--sf);margin-bottom:14px"><div style="font-size:10px;color:var(--dm)">Status</div>
        <div style="font-size:13px;font-weight:700;color:${S.backend?.authenticated?"var(--gn)":S.backend?"var(--yl)":"var(--rd)"}">${S.backend?.authenticated?"✅ Live · "+S.backend.instruments_count+" instruments":S.backend?"⚡ Need login":"❌ Not detected"}</div></div>
      <div style="display:flex;gap:8px"><button class="btn" style="flex:1;background:var(--ac);color:var(--bg);font-weight:700" onclick="checkBackend()">Check</button><button class="btn" style="color:var(--dm)" onclick="S.showSetup=false;render()">Close</button></div>
    </div></div>`;
  }

  document.getElementById("app").innerHTML=h;
}

function lv(l,v,c,big){return`<div class="lv"><div class="lv-l">${l}</div><div class="lv-v" style="font-size:${big?13:12}px;color:${c}">${v}</div></div>`}
function mbox(l,v,s,g){const c=g?"var(--gn)":"var(--rd)";return`<div class="mb" style="border-left-color:${c}"><div style="font-size:9px;color:var(--dm)">${l}</div><div style="font-size:14px;font-weight:700;color:${c}">${v}</div><div style="font-size:9px;color:var(--dm)">${s}</div></div>`}
function rl(items){return`<div style="display:grid;gap:4px">${items.map((t,i)=>`<div class="rl"><span style="color:var(--ac);font-weight:700;font-size:9px;flex-shrink:0">${String(i+1).padStart(2,"0")}</span><span>${t}</span></div>`).join("")}</div>`}

// ─── BOOT ──────────────────────────────────────────────────
checkBackend();
const r0=analyze();S.result=r0;render();
setInterval(tick,S.mode==="mock"?3000:8000);
</script>
</body>
</html>
