<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NiftyAgent">
<meta name="theme-color" content="#060a10">
<title>Nifty Trading Agent</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a10;--sf:#0c1220;--cd:#111a2e;--bd:#1a2744;--ac:#00e5ff;--gn:#00e676;--rd:#ff1744;--yl:#ffc400;--tx:#e4eaf6;--dm:#5a6a8a;--bl:#448aff;--or:#ff9100}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--tx);min-height:100vh;padding:12px;padding-bottom:80px}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
input{font-family:inherit}
.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px}
.cd{padding:14px;border-radius:12px;background:var(--cd);border:1px solid var(--bd)}
.ct{font-size:9px;font-weight:700;color:var(--dm);letter-spacing:1.5px;margin-bottom:10px}
.pill{padding:3px 8px;border-radius:16px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.btn{padding:7px 12px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--ac);font-weight:600;font-size:10px}
.btn-sm{padding:5px 10px;border-radius:6px;border:1px solid var(--bd);background:transparent;font-weight:600;font-size:9px}
.lv{padding:8px;border-radius:6px;background:var(--sf)}
.s2{grid-column:1/-1}
.mb{padding:8px;border-radius:8px;background:var(--sf);border-left:3px solid}
.fc{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;background:var(--sf);border-left:3px solid;font-size:10px}
table{width:100%;border-collapse:collapse;font-size:10px}
th{padding:6px;font-size:9px;font-weight:600;background:var(--sf)}
td{padding:4px 6px}
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--cd);border-top:1px solid var(--bd);z-index:100;padding:4px 8px;gap:2px}
.tab{flex:1;padding:8px 4px;border-radius:8px;font-size:9px;font-weight:600;border:none;background:transparent;color:var(--dm);text-align:center;line-height:1.3}
.tab.active{background:var(--sf);color:var(--ac)}
.tab-icon{font-size:16px;display:block;margin-bottom:2px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:grid;place-items:center;z-index:200;padding:16px}
.modal-box{background:var(--cd);border:1px solid var(--bd);border-radius:14px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.sig-card{padding:14px;border-radius:10px;background:var(--cd);border-left:4px solid;margin-bottom:10px}
.search-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-size:14px;outline:none}
.search-input:focus{border-color:var(--ac)}
.chart-container{background:var(--sf);border-radius:10px;padding:10px;border:1px solid var(--bd);overflow:hidden}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 2s infinite}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.slide-up{animation:slideUp .3s ease}
@media(max-width:600px){.g{grid-template-columns:1fr}.s2{grid-column:1}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const B=window.location.origin,LOTS={NIFTY:65,BANKNIFTY:30};
let S={mode:"mock",idx:"NIFTY",nSpot:22235,bSpot:53200,
nHist:[22180,22190,22200,22210,22195,22205,22220,22215,22230,22225,22240,22235,22220,22230,22235],
bHist:[53e3,53050,53100,53080,53120,53150,53130,53170,53200,53180,53160,53190,53220,53210,53200],
chain:[],result:null,todaySignals:[],lastSignalDir:null,lastSignalSpot:0,
lastSLHitTime:0,lastSLHitDir:null,recCE:null,recPE:null,
tab:"dashboard",capital:2e5,tick:0,backend:null,isAdmin:false,
showSetup:false,signalHistory:[],
stockSearch:"",stockData:null,stockLoading:false,stockTF:"daily"};

// ─── TECHNICALS ────────────────────────────────────────────
const PCR=c=>{const p=c.reduce((s,r)=>s+(r.pe?.oi||0),0),q=c.reduce((s,r)=>s+(r.ce?.oi||0),0);return q?+(p/q).toFixed(2):0};
const MP=c=>{let m=c[0]?.strike||0,v=1/0;c.forEach(({strike:s})=>{let p=0;c.forEach(r=>{if(s>r.strike)p+=(r.ce?.oi||0)*(s-r.strike);if(s<r.strike)p+=(r.pe?.oi||0)*(r.strike-s)});if(p<v){v=p;m=s}});return m};
const VWAP=p=>p.length?+(p.reduce((s,v)=>s+v,0)/p.length).toFixed(2):0;
const RSI=(p,n=14)=>{if(p.length<n+1)return 50;let g=0,l=0;for(let i=p.length-n;i<p.length;i++){const d=p[i]-p[i-1];d>0?g+=d:l-=d}const a=g/n,b=l/n;return b===0?100:+(100-100/(1+a/b)).toFixed(1)};
const EMA=(p,n)=>{if(p.length<n)return p[p.length-1]||0;const k=2/(n+1);let e=p.slice(0,n).reduce((s,v)=>s+v,0)/n;for(let i=n;i<p.length;i++)e=p[i]*k+e*(1-k);return+e.toFixed(2)};
const STr=(p,f=2,n=10)=>{if(p.length<n)return{value:p[p.length-1],trend:"BULLISH"};const a=p.slice(-n).reduce((s,_,i,a)=>i?s+Math.abs(a[i]-a[i-1]):s,0)/(n-1);const l=p[p.length-1],lo=l-f*a;return l>lo?{value:+lo.toFixed(2),trend:"BULLISH"}:{value:+(l+f*a).toFixed(2),trend:"BEARISH"}};
const PV=(h,l,c)=>{const pp=+((h+l+c)/3).toFixed(2);return{r3:+(h+2*(pp-l)).toFixed(2),r2:+(pp+(h-l)).toFixed(2),r1:+(2*pp-l).toFixed(2),pp,s1:+(2*pp-h).toFixed(2),s2:+(pp-(h-l)).toFixed(2),s3:+(l-2*(h-pp)).toFixed(2)}};
const fmt=n=>typeof n==="number"?n.toLocaleString("en-IN",{maximumFractionDigits:2}):n;

// ─── ANALYSIS + SIGNAL ─────────────────────────────────────
function analyze(){
  const spot=S.idx==="NIFTY"?S.nSpot:S.bSpot,hist=S.idx==="NIFTY"?S.nHist:S.bHist,chain=S.chain;
  if(hist.length<10)return{score:0,reasons:[],signal:null,analysis:null};
  const _pcr=chain.length?PCR(chain):1,_mp=chain.length?MP(chain):spot,_vwap=VWAP(hist),_rsi=RSI(hist);
  const e9=EMA(hist,9),e21=EMA(hist,21),_st=STr(hist);
  const hi=Math.max(...hist.slice(-30)),lo=Math.min(...hist.slice(-30)),pvt=PV(hi,lo,spot);
  let sc=0;const R=[];
  if(_pcr>1.3){sc+=2;R.push({t:`PCR ${_pcr} → heavy put writing (bullish)`,tp:"bull",w:2})}else if(_pcr>1.05){sc+=1;R.push({t:`PCR ${_pcr} → mild put support`,tp:"bull",w:1})}else if(_pcr<.7){sc-=2;R.push({t:`PCR ${_pcr} → heavy call writing (bearish)`,tp:"bear",w:2})}else if(_pcr<.95){sc-=1;R.push({t:`PCR ${_pcr} → mild call pressure`,tp:"bear",w:1})}else{R.push({t:`PCR ${_pcr} → neutral`,tp:"neutral",w:0})}
  const md=spot-_mp;if(md<-80){sc+=1;R.push({t:`${Math.abs(md).toFixed(0)} below max pain ${_mp}`,tp:"bull",w:1})}else if(md>80){sc-=1;R.push({t:`${md.toFixed(0)} above max pain ${_mp}`,tp:"bear",w:1})}else{R.push({t:`Near max pain ${_mp}`,tp:"neutral",w:0})}
  if(_rsi<25){sc+=2;R.push({t:`RSI ${_rsi} → deeply oversold`,tp:"bull",w:2})}else if(_rsi<35){sc+=1;R.push({t:`RSI ${_rsi} → nearing oversold`,tp:"bull",w:1})}else if(_rsi>75){sc-=2;R.push({t:`RSI ${_rsi} → deeply overbought`,tp:"bear",w:2})}else if(_rsi>65){sc-=1;R.push({t:`RSI ${_rsi} → nearing overbought`,tp:"bear",w:1})}else{R.push({t:`RSI ${_rsi} → neutral`,tp:"neutral",w:0})}
  const vd=spot-_vwap;if(vd>30){sc+=1;R.push({t:`${vd.toFixed(0)} above VWAP → buyers`,tp:"bull",w:1})}else if(vd<-30){sc-=1;R.push({t:`${Math.abs(vd).toFixed(0)} below VWAP → sellers`,tp:"bear",w:1})}else{R.push({t:`Near VWAP`,tp:"neutral",w:0})}
  if(_st.trend==="BULLISH"){sc+=1;R.push({t:`Supertrend BULLISH ${_st.value}`,tp:"bull",w:1})}else{sc-=1;R.push({t:`Supertrend BEARISH ${_st.value}`,tp:"bear",w:1})}
  const ed=e9-e21;if(ed>10){sc+=1;R.push({t:`9EMA>${e21} by ${ed.toFixed(0)}`,tp:"bull",w:1})}else if(ed<-10){sc-=1;R.push({t:`9EMA<${e21} by ${Math.abs(ed).toFixed(0)}`,tp:"bear",w:1})}else{R.push({t:`EMAs converging`,tp:"neutral",w:0})}
  const ns=[pvt.s1,pvt.s2].find(s=>Math.abs(spot-s)<25),nr=[pvt.r1,pvt.r2].find(r=>Math.abs(spot-r)<25);
  if(ns){sc+=1;R.push({t:`At support ${ns}`,tp:"bull",w:1})}if(nr){sc-=1;R.push({t:`At resistance ${nr}`,tp:"bear",w:1})}
  const a={pcr:_pcr,maxPain:_mp,vwap:_vwap,rsi:_rsi,ema9:e9,ema21:e21,supertrend:_st,pivots:pvt,high:hi,low:lo};
  const lot=LOTS[S.idx]||65,mr=S.capital*.02;let sig=null;
  const now=new Date(),hr=now.getHours(),mn=now.getMinutes(),tok=(hr>9||(hr===9&&mn>=30))&&(hr<14||(hr===14&&mn<=30));
  if(Math.abs(sc)>=5&&tok){
    const dir=sc>0?"BULLISH":"BEARISH",rec=dir==="BULLISH"?S.recCE:S.recPE;
    if(rec&&rec.ltp>0){const ltp=rec.ltp,slP=Math.max(ltp*.3,15),sl=+(ltp-slP).toFixed(2),t1=+(ltp*1.4).toFixed(2),t2=+(ltp*1.7).toFixed(2);
    const rpl=slP*lot,lots=Math.max(1,Math.floor(mr/rpl));
    sig={dir,tradingsymbol:rec.tradingsymbol,strike:rec.strike,optionType:rec.type,expiry:rec.expiry,entryPrice:ltp,slPrice:sl,slPoints:+slP.toFixed(2),t1Price:t1,t2Price:t2,lots,lotSize:lot,totalRisk:+(rpl*lots).toFixed(0),totalReward:+((t1-ltp)*lot*lots).toFixed(0),rr:+((t1-ltp)/slP).toFixed(1),conf:Math.min(Math.abs(sc),7),volume:rec.volume,oi:rec.oi,spread:rec.spread,reasons:R,spotAtSignal:spot}}
  }
  return{score:sc,reasons:R,signal:sig,analysis:a};
}

function gateSignal(r){
  if(!r.signal)return;const now=Date.now(),dir=r.signal.dir,spot=S.idx==="NIFTY"?S.nSpot:S.bSpot;
  let ok=false,br="";
  if(S.todaySignals.length>=2)br="Daily limit (2/2)";
  else if(!S.lastSignalDir)ok=true;
  else if(dir!==S.lastSignalDir){if(S.lastSLHitDir===dir&&now-S.lastSLHitTime<9e5)br=`SL cooldown ${dir} (${Math.max(0,15-Math.round((now-S.lastSLHitTime)/6e4))}m)`;else ok=true}
  else{const mv=Math.abs(spot-S.lastSignalSpot);if(mv>=50)ok=true;else br=`Same dir, ${mv.toFixed(0)}/50 pts moved`}
  if(ok){
    const sig={...r.signal,time:new Date().toLocaleTimeString("en-IN"),id:now,outcome:"open",pnl:null};
    S.todaySignals=[sig,...S.todaySignals];S.lastSignalDir=dir;S.lastSignalSpot=spot;
    // Save to server
    fetch(`${B}/api/signals`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(sig)}).catch(()=>{});
    // Play alert sound
    try{const ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=dir==="BULLISH"?880:440;o.type="sine";g.gain.value=0.3;o.start();setTimeout(()=>{o.stop();ac.close()},300)}catch(e){}
  }
  if(br)r._blockReason=br;
}

function markOutcome(id,outcome){
  const sig=S.todaySignals.find(s=>s.id===id);if(!sig)return;
  sig.outcome=outcome;sig.exit_time=new Date().toLocaleTimeString("en-IN");
  const e=sig.entryPrice,ls=sig.lotSize,lots=sig.lots;
  if(outcome==="sl_hit"){sig.pnl=Math.round((sig.slPrice-e)*lots*ls);S.lastSLHitTime=Date.now();S.lastSLHitDir=sig.dir}
  else if(outcome==="t1_hit")sig.pnl=Math.round((sig.t1Price-e)*lots*ls);
  else if(outcome==="t2_hit")sig.pnl=Math.round((sig.t2Price-e)*lots*ls);
  fetch(`${B}/api/signals/update`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,outcome})}).catch(()=>{});
  render();
}

async function adminDisconnect(){
  if(!confirm("Disconnect Kite? All users will see mock data."))return;
  await fetch(`${B}/api/admin/disconnect`,{method:"POST"});S.mode="mock";S.backend=null;render();
}

// ─── BACKEND ───────────────────────────────────────────────
async function checkBackend(){try{const r=await fetch(`${B}/api/status`);const d=await r.json();S.backend=d;S.isAdmin=d.is_admin||false;if(d.authenticated)S.mode="live";else S.mode="mock"}catch{S.backend=null;S.mode="mock"}render()}
async function fetchLive(){
  if(S.mode!=="live")return;
  try{const r=await fetch(`${B}/api/market-data/${S.idx}`);const d=await r.json();
  if(d.data){const s=d.data.spot;if(S.idx==="NIFTY"){S.nSpot=s;S.nHist=[...S.nHist.slice(-99),s]}else{S.bSpot=s;S.bHist=[...S.bHist.slice(-99),s]}
  if(d.data.chain?.length)S.chain=d.data.chain;if(d.data.recommended_ce)S.recCE=d.data.recommended_ce;if(d.data.recommended_pe)S.recPE=d.data.recommended_pe}}catch(e){console.error(e)}
}
async function loadHistory(){try{const r=await fetch(`${B}/api/signals`);const d=await r.json();if(d.signals)S.signalHistory=d.signals}catch{}}
async function searchStock(){
  if(!S.stockSearch.trim())return;S.stockLoading=true;render();
  try{const r=await fetch(`${B}/api/stock/${S.stockSearch.trim()}`);const d=await r.json();S.stockData=d.data||null;S.stockLoading=false}catch{S.stockData=null;S.stockLoading=false}render();
}

function tick(){
  if(S.mode==="mock"){S.nSpot=+(S.nSpot+(Math.random()-.48)*12).toFixed(2);S.nHist=[...S.nHist.slice(-99),S.nSpot];S.bSpot=+(S.bSpot+(Math.random()-.48)*30).toFixed(2);S.bHist=[...S.bHist.slice(-99),S.bSpot]}
  else fetchLive();S.tick++;const r=analyze();S.result=r;gateSignal(r);render();
}

// ─── CHART DRAWING ─────────────────────────────────────────
function drawChart(candles,el,w=340,h=180){
  if(!candles||!candles.length||!el)return;
  const c=document.createElement("canvas");c.width=w;c.height=h;el.innerHTML="";el.appendChild(c);
  const ctx=c.getContext("2d");
  const data=candles.slice(-60);// Last 60 candles
  const highs=data.map(d=>d[2]),lows=data.map(d=>d[3]);
  const maxP=Math.max(...highs),minP=Math.min(...lows),rng=maxP-minP||1;
  const bw=Math.max(2,(w-20)/data.length-1),pad=10;
  // Grid
  ctx.strokeStyle="#1a274440";ctx.lineWidth=0.5;
  for(let i=0;i<5;i++){const y=pad+i*(h-2*pad)/4;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();
    ctx.fillStyle="#5a6a8a";ctx.font="8px monospace";ctx.fillText((maxP-(i/4)*rng).toFixed(0),2,y-2)}
  // Candles
  data.forEach((d,i)=>{
    const o=d[1],hi=d[2],lo=d[3],cl=d[4];
    const x=pad+i*(bw+1),yO=pad+(maxP-o)/rng*(h-2*pad),yC=pad+(maxP-cl)/rng*(h-2*pad);
    const yH=pad+(maxP-hi)/rng*(h-2*pad),yL=pad+(maxP-lo)/rng*(h-2*pad);
    const bull=cl>=o;ctx.strokeStyle=bull?"#00e676":"#ff1744";ctx.fillStyle=bull?"#00e676":"#ff1744";
    ctx.beginPath();ctx.moveTo(x+bw/2,yH);ctx.lineTo(x+bw/2,yL);ctx.stroke();
    ctx.fillRect(x,Math.min(yO,yC),bw,Math.max(1,Math.abs(yC-yO)));
  });
  // EMA lines
  const closes=data.map(d=>d[4]);
  [9,21].forEach((n,idx)=>{
    if(closes.length<n)return;
    ctx.strokeStyle=idx===0?"#00e5ff":"#ff9100";ctx.lineWidth=1;ctx.beginPath();
    let started=false;
    closes.forEach((_,i)=>{
      if(i<n-1)return;
      const slice=closes.slice(0,i+1);
      const k=2/(n+1);let e=slice.slice(0,n).reduce((s,v)=>s+v,0)/n;
      for(let j=n;j<slice.length;j++)e=slice[j]*k+e*(1-k);
      const x=pad+i*(bw+1)+bw/2,y=pad+(maxP-e)/rng*(h-2*pad);
      if(!started){ctx.moveTo(x,y);started=true}else ctx.lineTo(x,y);
    });ctx.stroke();
  });
}

// ─── SPARKLINE ─────────────────────────────────────────────
function spark(data,w=100,h=30){if(!data||data.length<2)return"";const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*(h-4)-2}`).join(" ");const c=data[data.length-1]>=data[data.length-2]?"var(--gn)":"var(--rd)";return`<svg width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.5" stroke-linecap="round"/></svg>`}

// ─── RENDER ────────────────────────────────────────────────
function render(){
  const spot=S.idx==="NIFTY"?S.nSpot:S.bSpot,a=S.result?.analysis,sc=S.result?.score||0;
  const as=S.todaySignals.find(s=>s.outcome==="open"),step=S.idx==="NIFTY"?50:100;
  const nC=S.nHist.length>1?S.nSpot-S.nHist[S.nHist.length-2]:0;
  const bC=S.bHist.length>1?S.bSpot-S.bHist[S.bHist.length-2]:0;
  const mc=S.mode==="live"?"var(--gn)":"var(--yl)";
  // Count today's P&L
  const todayPnL=S.todaySignals.reduce((s,x)=>s+(x.pnl||0),0);

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--ac),var(--bl));display:grid;place-items:center;font-size:15px;font-weight:800;color:var(--bg)">N</div>
      <div><div style="font-size:13px;font-weight:700;letter-spacing:.5px">NIFTY AGENT</div>
      <div style="font-size:8px;color:var(--dm);letter-spacing:1.5px">SMART SIGNALS · NIFTY:65 · BNIFTY:30</div></div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <span class="pill ${S.mode==="live"?"pulse":""}" style="background:${mc}18;color:${mc};border:1px solid ${mc}35">${S.mode==="live"?"● LIVE":"● MOCK"}</span>
      <span class="pill" style="background:var(--ac)18;color:var(--ac);border:1px solid #00e5ff35">${S.todaySignals.length}/2</span>
      ${todayPnL!==0?`<span class="pill" style="background:${todayPnL>0?"var(--gn)":"var(--rd)"}18;color:${todayPnL>0?"var(--gn)":"var(--rd)"};border:1px solid ${todayPnL>0?"#00e67635":"#ff174435"}">P&L: ₹${fmt(todayPnL)}</span>`:""}
      <button class="btn-sm" style="color:var(--ac)" onclick="checkBackend()">↻</button>
      ${S.isAdmin?`<button class="btn-sm" style="color:var(--or)" onclick="S.showSetup=true;render()">⚙ Admin</button>`:""}
    </div>
  </div>`;

  // Index cards
  h+=`<div style="display:flex;gap:8px;margin-bottom:10px">`;
  [["NIFTY",S.nSpot,S.nHist,nC],["BANKNIFTY",S.bSpot,S.bHist,bC]].forEach(([n,sp,hi,ch])=>{
    const ac=S.idx===n;h+=`<button onclick="S.idx='${n}';render()" style="flex:1;padding:8px 12px;border-radius:10px;background:${ac?"var(--cd)":"var(--sf)"};border:1px solid ${ac?"#00e5ff40":"var(--bd)"};display:flex;justify-content:space-between;align-items:center">
    <div style="text-align:left"><div style="font-size:9px;color:${ac?"var(--ac)":"var(--dm)"};font-weight:700;letter-spacing:1px">${n} <span style="color:var(--dm);font-weight:400">(${LOTS[n]})</span></div><div style="font-size:18px;font-weight:700">${fmt(sp)}</div><div style="font-size:10px;color:${ch>=0?"var(--gn)":"var(--rd)"};font-weight:600">${ch>=0?"▲":"▼"} ${Math.abs(ch).toFixed(2)}</div></div>
    ${spark(hi.slice(-25),80,28)}</button>`;
  });h+=`</div>`;

  // ═══ TAB CONTENT ═══
  if(S.tab==="dashboard"&&a){
    // Signal card
    const glow=as?(as.dir==="BULLISH"?"#00e676":"#ff1744"):null;

      <div style="padding:10px;border-radius:8px;background:var(--sf);margin-bottom:14px">
        <div style="font-size:10px;color:var(--dm)">Status</div>
        <div style="font-size:13px;font-weight:700;color:${S.backend?.authenticated?"var(--gn)":"var(--rd)"}">${S.backend?.authenticated?"✅ Live · "+S.backend.instruments_count+" instruments":"❌ Disconnected"}</div>
      </div>
      <button class="btn" style="width:100%;color:var(--dm)" onclick="S.showSetup=false;render()">Close</button>
    </div></div>`;
  }

  document.getElementById("app").innerHTML=h;

  // Draw stock chart after render
  if(S.tab==="stock"&&S.stockData){
    const el=document.getElementById("stockChart");
    const candles=S.stockData.candles?.[S.stockTF]||S.stockData.candles?.daily||[];
    if(el&&candles.length)setTimeout(()=>drawChart(candles,el,el.parentElement.offsetWidth-20,200),50);
  }
}

function lv(l,v,c){return`<div class="lv"><div style="font-size:7px;color:var(--dm);letter-spacing:.5px;margin-bottom:1px">${l}</div><div style="font-size:11px;font-weight:700;color:${c};word-break:break-all">${v}</div></div>`}
function mbox(l,v,s,g){const c=g?"var(--gn)":"var(--rd)";return`<div class="mb" style="border-left-color:${c}"><div style="font-size:8px;color:var(--dm)">${l}</div><div style="font-size:13px;font-weight:700;color:${c}">${v}</div><div style="font-size:8px;color:var(--dm)">${s}</div></div>`}
function rl(items){return`<div style="display:grid;gap:3px">${items.map((t,i)=>`<div style="display:flex;gap:6px;padding:4px 6px;border-radius:4px;background:var(--sf);font-size:9px"><span style="color:var(--ac);font-weight:700;flex-shrink:0">${String(i+1).padStart(2,"0")}</span><span>${t}</span></div>`).join("")}</div>`}

// ─── BOOT ──────────────────────────────────────────────────
checkBackend();loadHistory();S.result=analyze();render();
setInterval(tick,S.mode==="mock"?3000:8000);
</script>
</body>
</html>
