<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a10">
<title>Nifty Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a10;--s1:#0b1018;--s2:#111a2e;--s3:#192240;--bd:#1e2d4a;--ac:#00e5ff;--gn:#00e676;--rd:#ff1744;--yl:#ffc400;--tx:#e4eaf6;--t2:#a0aec0;--dm:#5a6a8a;--or:#ff9100}
body{font-family:-apple-system,'SF Pro Text',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
input,select{font-family:inherit}

/* Ticker strip */
.ticker{display:flex;gap:2px;padding:8px 12px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50}
.ticker-item{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;border:1px solid transparent;cursor:pointer;flex:1;min-width:0;transition:all .2s}
.ticker-item.active{background:var(--s2);border-color:var(--bd)}
.ticker-item:not(.active):hover{background:var(--s1)}
.ticker-name{font-size:11px;font-weight:700;color:var(--t2)}
.ticker-price{font-size:16px;font-weight:700;color:var(--tx)}
.ticker-change{font-size:11px;font-weight:600}
.ticker-change.up{color:var(--gn)}.ticker-change.down{color:var(--rd)}

/* Main content */
.content{padding:12px;padding-bottom:76px}

/* Cards */
.card{background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:12px}
.card-glow-green{border-color:#00e67640;box-shadow:0 0 20px #00e67610}
.card-glow-red{border-color:#ff174440;box-shadow:0 0 20px #ff174410}
.card-title{font-size:10px;font-weight:700;color:var(--dm);letter-spacing:1.5px;margin-bottom:12px;text-transform:uppercase}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}

/* Metric boxes */
.metric{padding:10px;border-radius:10px;background:var(--s1);border-left:3px solid}
.metric-label{font-size:9px;color:var(--dm);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.metric-value{font-size:15px;font-weight:700}
.metric-sub{font-size:9px;color:var(--dm);margin-top:1px}

/* Signal card */
.signal-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:10px;font-size:14px;font-weight:800}
.signal-badge.bull{background:#00e67618;color:var(--gn);border:1px solid #00e67635}
.signal-badge.bear{background:#ff174418;color:var(--rd);border:1px solid #ff174435}

/* Data grid */
.data-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.data-cell{padding:10px;border-radius:8px;background:var(--s1)}
.data-label{font-size:8px;color:var(--dm);letter-spacing:.5px;margin-bottom:3px;text-transform:uppercase}
.data-value{font-size:13px;font-weight:700}

/* Factor pills */
.factor{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:var(--s1);border-left:3px solid;margin-bottom:4px;font-size:11px}

/* History cards */
.hist-card{padding:14px;border-radius:12px;background:var(--s2);border-left:4px solid;margin-bottom:8px;border:1px solid var(--bd)}

/* Bottom tabs */
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--s1);border-top:1px solid var(--bd);z-index:100;padding:6px 8px;gap:4px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav-btn{flex:1;padding:6px 4px;border-radius:10px;font-size:9px;font-weight:600;border:none;background:transparent;color:var(--dm);text-align:center}
.nav-btn.active{background:var(--s2);color:var(--ac)}
.nav-icon{font-size:18px;display:block;margin-bottom:2px}

/* Buttons */
.btn{padding:8px 16px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--ac);font-weight:600;font-size:11px;transition:all .2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--ac);color:var(--bg);border-color:var(--ac)}
.btn-danger{background:#ff174420;color:var(--rd);border-color:#ff174440}
.btn-success{background:#00e67620;color:var(--gn);border-color:#00e67640}
.btn-sm{padding:6px 12px;font-size:10px;border-radius:8px}

/* Inputs */
.input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-size:14px;outline:none;transition:border .2s}
.input:focus{border-color:var(--ac)}

/* TF buttons */
.tf-group{display:flex;gap:4px;margin-bottom:12px}
.tf-btn{padding:8px 16px;border-radius:8px;font-size:11px;font-weight:600;border:1px solid var(--bd);background:var(--s1);color:var(--t2);transition:all .2s}
.tf-btn.active{background:#00e5ff20;color:var(--ac);border-color:#00e5ff50}

/* Chart container for TradingView */
.tv-chart{width:100%;height:400px;border-radius:12px;overflow:hidden;border:1px solid var(--bd);background:var(--s1)}

/* Scanner pick card */
.pick{padding:12px;border-radius:10px;background:var(--s1);border-left:3px solid;margin-bottom:8px;cursor:pointer;transition:all .2s}
.pick:active{transform:scale(.98)}

/* Toggle */
.toggle{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .2s}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:white;top:2px;transition:left .2s}
.toggle.on{background:var(--gn)}.toggle.on::after{left:22px}
.toggle.off{background:var(--dm)}.toggle.off::after{left:2px}

/* Config row */
.cfg{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;background:var(--s1);margin-bottom:6px}
.cfg-label{font-size:12px;color:var(--tx)}
.cfg-input{width:70px;padding:6px 8px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);color:var(--ac);font-size:13px;font-weight:700;text-align:center;outline:none}

/* Pill */
.pill{padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;display:inline-flex;align-items:center;gap:4px}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:grid;place-items:center;z-index:200;padding:16px}
.modal-box{background:var(--s2);border:1px solid var(--bd);border-radius:16px;padding:24px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto}

/* Table */
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:8px 6px;font-size:9px;font-weight:600;background:var(--s1);color:var(--dm);text-transform:uppercase;letter-spacing:.5px}
td{padding:6px}
tr{border-bottom:1px solid var(--bd)}

/* Score bar */
.score-bar{display:flex;gap:3px;justify-content:center}
.score-dot{width:20px;height:5px;border-radius:3px;transition:all .3s}

/* Responsive */
@media(max-width:640px){.grid{grid-template-columns:1fr}.data-grid{grid-template-columns:repeat(2,1fr)}.tv-chart{height:300px}.ticker-price{font-size:14px}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>

<!-- Ticker Strip (always visible) -->
<div class="ticker" id="ticker"></div>

<!-- Search input for stocks (persistent, outside render) -->
<div id="search-wrap" style="display:none;padding:12px 12px 0">
<div style="display:flex;gap:8px;align-items:center">
<input id="search-input" class="input" placeholder="Search stock (RELIANCE, TCS, INFY...)" autocomplete="off" autocorrect="off" spellcheck="false" style="flex:1;min-width:0">
<button class="btn btn-primary" onclick="searchStock()" style="white-space:nowrap;padding:12px 24px;flex-shrink:0">Analyze</button>
</div>
</div>

<!-- Main content -->
<div class="content" id="main"></div>

<!-- Bottom Navigation -->
<div class="nav" id="nav"></div>

<script>
var B=window.location.origin;

// ─── STATE ─────────────────────────────────────────────────
var CFG={niftyLot:65,bnfLot:30,usePnF:true,useRenko:true,renkoSize:20,pnfBox:10,pnfRev:3,minScore:5,maxSig:2,scanEnabled:false,scanAuto:false,scanInterval:10};
try{var sc=localStorage.getItem("na5cfg");if(sc)Object.assign(CFG,JSON.parse(sc))}catch(e){}
function saveCfg(){try{localStorage.setItem("na5cfg",JSON.stringify(CFG))}catch(e){}}

// Persist active tab
var savedTab=localStorage.getItem("na5tab")||"dashboard";

var S={mode:"mock",idx:"NIFTY",nSpot:22235,bSpot:53200,nOhlc:{},bOhlc:{},
nHist:[22180,22200,22220,22215,22230,22225,22240,22235,22220,22230,22235],
bHist:[53e3,53050,53100,53130,53170,53200,53180,53160,53190,53200],
chain:[],result:null,todaySignals:[],lastSignalDir:null,lastSignalSpot:0,
lastSLHitTime:0,lastSLHitDir:null,recCE:null,recPE:null,
tab:savedTab,capital:2e5,tick:0,backend:null,isAdmin:false,
showModal:null,signalHistory:[],
stockData:null,stockLoading:false,stockTF:"daily",
scanData:null,scanLoading:false};

// ─── TECHNICALS ────────────────────────────────────────────
function pcrCalc(c){var p=0,q=0;c.forEach(function(r){p+=(r.pe?r.pe.oi:0)||0;q+=(r.ce?r.ce.oi:0)||0});return q?+(p/q).toFixed(2):0}
function mpCalc(c){var m=c[0]?c[0].strike:0,v=1/0;c.forEach(function(r){var p=0;c.forEach(function(o){if(r.strike>o.strike)p+=((o.ce?o.ce.oi:0)||0)*(r.strike-o.strike);if(r.strike<o.strike)p+=((o.pe?o.pe.oi:0)||0)*(o.strike-r.strike)});if(p<v){v=p;m=r.strike}});return m}
function vwapCalc(p){return p.length?+(p.reduce(function(s,v){return s+v},0)/p.length).toFixed(2):0}
function rsiCalc(p){var n=14;if(p.length<n+1)return 50;var g=0,l=0;for(var i=p.length-n;i<p.length;i++){var d=p[i]-p[i-1];if(d>0)g+=d;else l-=d}var ag=g/n,al=l/n;return al===0?100:+(100-100/(1+ag/al)).toFixed(1)}
function emaCalc(p,n){if(p.length<n)return p[p.length-1]||0;var k=2/(n+1),e=0;for(var i=0;i<n;i++)e+=p[i];e/=n;for(var i=n;i<p.length;i++)e=p[i]*k+e*(1-k);return+e.toFixed(2)}
function stCalc(p){if(p.length<10)return{v:p[p.length-1],t:"BULL"};var a=0;for(var i=p.length-10;i<p.length;i++)a+=Math.abs(p[i]-p[i-1]);a/=10;var l=p[p.length-1],lo=l-2*a;return l>lo?{v:+lo.toFixed(2),t:"BULL"}:{v:+(l+2*a).toFixed(2),t:"BEAR"}}
function pivCalc(h,l,c){var pp=+((h+l+c)/3).toFixed(2);return{r2:+(pp+(h-l)).toFixed(2),r1:+(2*pp-l).toFixed(2),pp:pp,s1:+(2*pp-h).toFixed(2),s2:+(pp-(h-l)).toFixed(2)}}
var fmt=function(n){return typeof n==="number"?n.toLocaleString("en-IN",{maximumFractionDigits:2}):n||""};


// ─── RENKO CHART ───────────────────────────────────────────
function buildRenko(closes,brickSize){
  if(!closes||closes.length<2)return{bricks:[],trend:"NEUTRAL",signal:0};
  var bs=brickSize||20,bricks=[],base=Math.floor(closes[0]/bs)*bs,dir=0;
  for(var i=1;i<closes.length;i++){var p=closes[i];
    while(p>=base+bs*2&&dir>=0){base+=bs;bricks.push({o:base-bs,c:base,type:"up"});dir=1}
    while(p>=base+bs&&dir<=0){base+=bs;bricks.push({o:base-bs,c:base,type:"up"});dir=1}
    while(p<=base-bs*2&&dir<=0){base-=bs;bricks.push({o:base+bs,c:base,type:"down"});dir=-1}
    while(p<=base-bs&&dir>=0){base-=bs;bricks.push({o:base+bs,c:base,type:"down"});dir=-1}
  }
  if(!bricks.length)return{bricks:bricks,trend:"NEUTRAL",signal:0};
  var last5=bricks.slice(-5),ups=last5.filter(function(b){return b.type==="up"}).length;
  var trend=ups>=4?"STRONG UP":ups>=3?"UP":ups<=1?"STRONG DOWN":ups<=2?"DOWN":"NEUTRAL";
  var signal=ups>=4?2:ups>=3?1:ups<=1?-2:ups<=2?-1:0;
  return{bricks:bricks.slice(-40),trend:trend,signal:signal};
}
function renkoSVG(bricks,w,h){
  if(!bricks.length)return"<div style=\"text-align:center;padding:15px;color:var(--dm);font-size:10px\">No data</div>";
  w=w||280;h=h||100;
  var prices=[];bricks.forEach(function(b){prices.push(b.o,b.c)});
  var mn=Math.min.apply(null,prices),mx=Math.max.apply(null,prices),rng=mx-mn||1;
  var pad=32,bw=Math.min(12,Math.max(4,(w-pad-10)/bricks.length)),ch=h-16;
  var svg="<svg width=\""+w+"\" height=\""+h+"\" style=\"display:block\">";
  for(var g=0;g<4;g++){var gy=6+g*ch/3;var gp=(mx-(g/3)*rng).toFixed(0);svg+="<line x1=\""+pad+"\" y1=\""+gy+"\" x2=\""+w+"\" y2=\""+gy+"\" stroke=\"#1a274430\" stroke-width=\"0.5\"/>";svg+="<text x=\"2\" y=\""+(gy+3)+"\" fill=\"#5a6a8a\" font-size=\"7\" font-family=\"monospace\">"+gp+"</text>"}
  bricks.forEach(function(b,i){var x=pad+i*(bw+1);var yT=6+(mx-Math.max(b.o,b.c))/rng*ch;var yB=6+(mx-Math.min(b.o,b.c))/rng*ch;var bh=Math.max(3,yB-yT);var cl=b.type==="up"?"#00e676":"#ff1744";svg+="<rect x=\""+x+"\" y=\""+yT+"\" width=\""+bw+"\" height=\""+bh+"\" fill=\""+cl+"\" rx=\"2\" stroke=\""+(b.type==="up"?"#00c853":"#d50000")+"\" stroke-width=\"0.5\"/>"});
  svg+="</svg>";return svg;
}

// ─── POINT & FIGURE ────────────────────────────────────────
function buildPnF(closes,boxSize,reversal){
  if(!closes||closes.length<5)return{columns:[],trend:"NEUTRAL",signal:0};
  var box=boxSize||10,rev=reversal||3,columns=[],curCol={type:"X",boxes:[]};
  var curHigh=Math.floor(closes[0]/box)*box,curLow=curHigh;
  curCol.boxes.push(curHigh);
  for(var i=1;i<closes.length;i++){var p=closes[i];
    if(curCol.type==="X"){
      if(p>=curHigh+box){while(curHigh+box<=p){curHigh+=box;curCol.boxes.push(curHigh)}}
      else if(p<=curHigh-rev*box){columns.push({type:curCol.type,boxes:curCol.boxes.slice()});curCol={type:"O",boxes:[]};curLow=curHigh-box;for(var b=curLow;b>=p;b-=box){curCol.boxes.push(b);curLow=b}}
    }else{
      if(p<=curLow-box){while(curLow-box>=p){curLow-=box;curCol.boxes.push(curLow)}}
      else if(p>=curLow+rev*box){columns.push({type:curCol.type,boxes:curCol.boxes.slice()});curCol={type:"X",boxes:[]};curHigh=curLow+box;for(var b2=curHigh;b2<=p;b2+=box){curCol.boxes.push(b2);curHigh=b2}}
    }
  }
  if(curCol.boxes.length)columns.push({type:curCol.type,boxes:curCol.boxes.slice()});
  var cols=columns.slice(-20);if(!cols.length)return{columns:cols,trend:"NEUTRAL",signal:0};
  var lastCol=cols[cols.length-1],signal=0;
  if(lastCol.type==="X"){var prevX=cols.filter(function(c2){return c2.type==="X"}).slice(-2);if(prevX.length>=2&&Math.max.apply(null,prevX[1].boxes)>Math.max.apply(null,prevX[0].boxes))signal=1}
  if(lastCol.type==="O"){var prevO=cols.filter(function(c2){return c2.type==="O"}).slice(-2);if(prevO.length>=2&&Math.min.apply(null,prevO[1].boxes)<Math.min.apply(null,prevO[0].boxes))signal=-1}
  var trend=lastCol.type==="X"&&signal>0?"BULLISH BREAKOUT":lastCol.type==="O"&&signal<0?"BEARISH BREAKDOWN":lastCol.type==="X"?"UP COLUMN":"DOWN COLUMN";
  return{columns:cols,trend:trend,signal:signal};
}
function pnfSVG(columns,w,h){
  if(!columns.length)return"<div style=\"text-align:center;padding:15px;color:var(--dm);font-size:10px\">No data</div>";
  w=w||280;h=h||100;
  var allBoxes=[];columns.forEach(function(c2){allBoxes=allBoxes.concat(c2.boxes)});
  var mn=Math.min.apply(null,allBoxes),mx=Math.max.apply(null,allBoxes),rng=mx-mn||1;
  var pad=32,cw=Math.min(14,Math.max(7,(w-pad-10)/columns.length)),ch=h-16;
  var svg="<svg width=\""+w+"\" height=\""+h+"\" style=\"display:block\">";
  for(var g=0;g<4;g++){var gy=6+g*ch/3;svg+="<line x1=\""+pad+"\" y1=\""+gy+"\" x2=\""+w+"\" y2=\""+gy+"\" stroke=\"#1a274430\" stroke-width=\"0.5\"/>"}
  columns.forEach(function(col,ci){var x=pad+ci*(cw+2);col.boxes.forEach(function(bx){var y=6+(mx-bx)/rng*ch;var sz=Math.max(5,cw-2);
    if(col.type==="X"){svg+="<line x1=\""+x+"\" y1=\""+y+"\" x2=\""+(x+sz)+"\" y2=\""+(y+sz)+"\" stroke=\"#00e676\" stroke-width=\"2\" stroke-linecap=\"round\"/>";svg+="<line x1=\""+(x+sz)+"\" y1=\""+y+"\" x2=\""+x+"\" y2=\""+(y+sz)+"\" stroke=\"#00e676\" stroke-width=\"2\" stroke-linecap=\"round\"/>"}
    else{svg+="<circle cx=\""+(x+sz/2)+"\" cy=\""+(y+sz/2)+"\" r=\""+(sz/2-1)+"\" fill=\"none\" stroke=\"#ff1744\" stroke-width=\"2\"/>"}
  })});
  svg+="</svg>";return svg;
}

// ─── SIGNAL ENGINE ─────────────────────────────────────────
function runAnalysis(){
  var spot=S.idx==="NIFTY"?S.nSpot:S.bSpot,hist=S.idx==="NIFTY"?S.nHist:S.bHist;
  if(hist.length<10)return{score:0,reasons:[],signal:null,a:null};
  var _pcr=S.chain.length?pcrCalc(S.chain):1,_mp=S.chain.length?mpCalc(S.chain):spot;
  var _vwap=vwapCalc(hist),_rsi=rsiCalc(hist),e9=emaCalc(hist,9),e21=emaCalc(hist,21),_st=stCalc(hist);
  var hi=Math.max.apply(null,hist.slice(-30)),lo=Math.min.apply(null,hist.slice(-30)),pv=pivCalc(hi,lo,spot);
  var sc=0,R=[];
  if(_pcr>1.3){sc+=2;R.push({t:"PCR "+_pcr+" heavy put writing",d:"bull",w:2})}
  else if(_pcr>1.05){sc+=1;R.push({t:"PCR "+_pcr+" mild put support",d:"bull",w:1})}
  else if(_pcr<.7){sc-=2;R.push({t:"PCR "+_pcr+" heavy call writing",d:"bear",w:2})}
  else if(_pcr<.95){sc-=1;R.push({t:"PCR "+_pcr+" call pressure",d:"bear",w:1})}
  else R.push({t:"PCR "+_pcr+" neutral",d:"neut",w:0});
  var md=spot-_mp;
  if(md<-80){sc+=1;R.push({t:Math.abs(md).toFixed(0)+" below max pain",d:"bull",w:1})}
  else if(md>80){sc-=1;R.push({t:md.toFixed(0)+" above max pain",d:"bear",w:1})}
  else R.push({t:"Near max pain",d:"neut",w:0});
  if(_rsi<25){sc+=2;R.push({t:"RSI "+_rsi+" oversold",d:"bull",w:2})}
  else if(_rsi<35){sc+=1;R.push({t:"RSI "+_rsi+" nearing oversold",d:"bull",w:1})}
  else if(_rsi>75){sc-=2;R.push({t:"RSI "+_rsi+" overbought",d:"bear",w:2})}
  else if(_rsi>65){sc-=1;R.push({t:"RSI "+_rsi+" nearing OB",d:"bear",w:1})}
  else R.push({t:"RSI "+_rsi+" neutral",d:"neut",w:0});
  var vd=spot-_vwap;
  if(vd>30){sc+=1;R.push({t:vd.toFixed(0)+" above VWAP",d:"bull",w:1})}
  else if(vd<-30){sc-=1;R.push({t:Math.abs(vd).toFixed(0)+" below VWAP",d:"bear",w:1})}
  else R.push({t:"Near VWAP",d:"neut",w:0});
  if(_st.t==="BULL"){sc+=1;R.push({t:"Supertrend bullish "+_st.v,d:"bull",w:1})}
  else{sc-=1;R.push({t:"Supertrend bearish "+_st.v,d:"bear",w:1})}
  var ed=e9-e21;
  if(ed>10){sc+=1;R.push({t:"EMA bull cross +"+ed.toFixed(0),d:"bull",w:1})}
  else if(ed<-10){sc-=1;R.push({t:"EMA bear cross "+ed.toFixed(0),d:"bear",w:1})}
  else R.push({t:"EMAs converging",d:"neut",w:0});
  var ns=[pv.s1,pv.s2].find(function(s){return Math.abs(spot-s)<25});
  var nr=[pv.r1,pv.r2].find(function(r){return Math.abs(spot-r)<25});
  if(ns){sc+=1;R.push({t:"At support "+ns,d:"bull",w:1})}
  if(nr){sc-=1;R.push({t:"At resistance "+nr,d:"bear",w:1})}
  // Renko signal
  if(CFG.useRenko&&hist.length>20){var rk=buildRenko(hist,CFG.renkoSize);if(rk.signal!==0){sc+=rk.signal;R.push({t:"Renko: "+rk.trend,d:rk.signal>0?"bull":"bear",w:Math.abs(rk.signal)})}else{R.push({t:"Renko: "+rk.trend,d:"neut",w:0})}}
  // P&F signal
  if(CFG.usePnF&&hist.length>20){var pf=buildPnF(hist,CFG.pnfBox,CFG.pnfRev);if(pf.signal!==0){sc+=pf.signal;R.push({t:"P&F: "+pf.trend,d:pf.signal>0?"bull":"bear",w:1})}else{R.push({t:"P&F: "+pf.trend,d:"neut",w:0})}}
  var a={pcr:_pcr,mp:_mp,vwap:_vwap,rsi:_rsi,e9:e9,e21:e21,st:_st,pv:pv,hi:hi,lo:lo};
  var lot=S.idx==="NIFTY"?CFG.niftyLot:CFG.bnfLot,mr=S.capital*.02,sig=null;
  var now=new Date(),hr=now.getHours(),mn=now.getMinutes();
  var timeOk=(hr>9||(hr===9&&mn>=30))&&(hr<14||(hr===14&&mn<=30));
  if(Math.abs(sc)>=CFG.minScore&&timeOk){
    var dir=sc>0?"BULLISH":"BEARISH",rec=dir==="BULLISH"?S.recCE:S.recPE;
    if(rec&&rec.ltp>0){
      var ltp=rec.ltp,slP=Math.max(ltp*.3,15),sl=+(ltp-slP).toFixed(2);
      var t1=+(ltp*1.4).toFixed(2),t2=+(ltp*1.7).toFixed(2);
      var rpl=slP*lot,lots=Math.max(1,Math.floor(mr/rpl));
      sig={dir:dir,tradingsymbol:rec.tradingsymbol,strike:rec.strike,optionType:rec.type,expiry:rec.expiry,entryPrice:ltp,slPrice:sl,slPoints:+slP.toFixed(2),t1Price:t1,t2Price:t2,lots:lots,lotSize:lot,totalRisk:+(rpl*lots).toFixed(0),totalReward:+((t1-ltp)*lot*lots).toFixed(0),rr:+((t1-ltp)/slP).toFixed(1)||2.0,conf:Math.min(Math.abs(sc),9),volume:rec.volume,oi:rec.oi,spread:rec.spread,reasons:R,spotAtSignal:spot};
    }
  }
  return{score:sc,reasons:R,signal:sig,a:a};
}

function gateSignal(r){
  if(!r.signal)return;var now=Date.now(),dir=r.signal.dir,spot=S.idx==="NIFTY"?S.nSpot:S.bSpot;
  var ok=false,br="";
  if(S.todaySignals.length>=CFG.maxSig)br="Daily limit";
  else if(!S.lastSignalDir)ok=true;
  else if(dir!==S.lastSignalDir){
    if(S.lastSLHitDir===dir&&now-S.lastSLHitTime<9e5)br="SL cooldown";
    else ok=true;
  }else{var mv=Math.abs(spot-S.lastSignalSpot);if(mv>=50)ok=true;else br="Same dir "+mv.toFixed(0)+"/50pts"}
  if(ok){
    var sig=Object.assign({},r.signal,{time:new Date().toLocaleTimeString("en-IN"),id:now,outcome:"open",pnl:null});
    S.todaySignals.unshift(sig);S.lastSignalDir=dir;S.lastSignalSpot=spot;
    fetch(B+"/api/signals",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(sig)}).catch(function(){});
    try{var ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=dir==="BULLISH"?880:440;o.type="sine";g.gain.value=.3;o.start();setTimeout(function(){o.stop();ac.close()},300)}catch(e){}
  }
  if(br)r._block=br;
}

function markOutcome(id,oc){
  var sig=S.todaySignals.find(function(s){return s.id==id});if(!sig)return;
  sig.outcome=oc;sig.exit_time=new Date().toLocaleTimeString("en-IN");
  if(oc==="sl_hit"){sig.pnl=Math.round((sig.slPrice-sig.entryPrice)*sig.lots*sig.lotSize);S.lastSLHitTime=Date.now();S.lastSLHitDir=sig.dir}
  else if(oc==="t1_hit")sig.pnl=Math.round((sig.t1Price-sig.entryPrice)*sig.lots*sig.lotSize);
  else if(oc==="t2_hit")sig.pnl=Math.round((sig.t2Price-sig.entryPrice)*sig.lots*sig.lotSize);
  fetch(B+"/api/signals/update",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:id,outcome:oc})}).catch(function(){});
  render();
}

function checkBackend(){fetch(B+"/api/status").then(function(r){return r.json()}).then(function(d){S.backend=d;S.isAdmin=d.is_admin||false;S.mode=d.authenticated?"live":"mock";render()}).catch(function(){S.backend=null;S.mode="mock";render()})}
function fetchLive(){
  if(S.mode!=="live")return;
  // Fetch both indices simultaneously
  fetch(B+"/api/market-data-both").then(function(r){return r.json()}).then(function(d){
    if(!d.data)return;
    if(d.data.nifty){S.nSpot=d.data.nifty.spot;S.nOhlc=d.data.nifty.ohlc||{};S.nHist=S.nHist.slice(-99).concat([d.data.nifty.spot])}
    if(d.data.banknifty){S.bSpot=d.data.banknifty.spot;S.bOhlc=d.data.banknifty.ohlc||{};S.bHist=S.bHist.slice(-99).concat([d.data.banknifty.spot])}
  }).catch(function(){});
  // Fetch proper multi-timeframe analysis
  fetch(B+"/api/analysis/"+S.idx).then(function(r){return r.json()}).then(function(d){
    if(!d.data)return;
    if(d.data.chain&&d.data.chain.length)S.chain=d.data.chain;
    if(d.data.recommended_ce)S.recCE=d.data.recommended_ce;
    if(d.data.recommended_pe)S.recPE=d.data.recommended_pe;
    // Use server-side analysis instead of client-side
    if(d.data.score!==undefined){
      S.serverAnalysis=d.data;
      S.result={score:d.data.score,reasons:d.data.reasons,signal:d.data.signal,a:{
        pcr:d.data.pcr,mp:d.data.max_pain,vwap:d.data.vwap,
        rsi:0,e9:0,e21:0,st:{t:"",v:0},pv:{r2:0,r1:0,pp:0,s1:0,s2:0},hi:0,lo:0
      }};
      // Gate the signal
      if(d.data.signal)gateSignal(S.result);
    }
  }).catch(function(e){console.error("Analysis error:",e)});
}

    // ═══ RULES ═══
  if(S.tab==="rules"){

  if(S.showModal==="config"){

function initTV(containerId,symbol,interval){
  var el=document.getElementById(containerId);if(!el)return;
  var iv=interval||"D";
  var opts={"autosize":true,"symbol":symbol,"interval":iv,"timezone":"Asia/Kolkata","theme":"dark","style":"1","locale":"in","allow_symbol_change":true,"calendar":false,"studies":["STD;RSI","STD;EMA"]};
  var url="https://s.tradingview.com/embed-widget/advanced-chart/?locale=in#"+encodeURIComponent(JSON.stringify(opts));
  el.innerHTML='<iframe src="'+url+'" style="width:100%;height:100%;border:none" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>';
}

function renderStockContent(){
  if(S.tab!=="stock")return;
  var el=document.getElementById("main");if(!el)return;
  var o="";

  if(S.stockLoading){o+='<div style="text-align:center;padding:40px;color:var(--dm)">Analyzing...</div>'}
  else if(S.stockData){
    var sd=S.stockData;
    // Back button
    o+='<button class="btn btn-sm" style="margin-bottom:12px" onclick="S.stockData=null;renderStockContent()">← Clear Search</button>';

    o+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center">';
    o+='<div><div style="font-size:18px;font-weight:700">'+sd.symbol+'</div>';
    var chg=sd.ltp-(sd.ohlc&&sd.ohlc.close||sd.ltp);
    o+='<div style="font-size:24px;font-weight:700;margin-top:4px">₹'+fmt(sd.ltp)+'</div>';
    o+='<div style="font-size:12px;color:'+(chg>=0?"var(--gn)":"var(--rd)")+';font-weight:600">'+(chg>=0?"▲ +":"▼ ")+Math.abs(chg).toFixed(2)+' ('+((chg/(sd.ohlc&&sd.ohlc.close||sd.ltp))*100).toFixed(2)+'%)</div></div>';
    o+='<div style="text-align:right;font-size:10px;color:var(--dm)">O: '+fmt(sd.ohlc?sd.ohlc.open:"")+' · H: '+fmt(sd.ohlc?sd.ohlc.high:"")+'<br>L: '+fmt(sd.ohlc?sd.ohlc.low:"")+' · Vol: '+fmt(sd.volume)+'</div></div></div>';

    // TradingView chart
    o+='<div class="tv-chart" id="tv-stock"></div>';

    // Technical analysis using candle data
    var candles=sd.candles&&sd.candles.daily||[];
    if(candles.length>15){
      var closes=candles.map(function(c){return c[4]});
      var _rsi=rsiCalc(closes),e9=emaCalc(closes,9),e21=emaCalc(closes,21),e50=emaCalc(closes,50),_st=stCalc(closes);
      var bp=0,brp=0;
      if(_rsi<35)bp+=2;else if(_rsi>65)brp+=2;
      if(e9>e21)bp++;else brp++;
      if(_st.t==="BULL")bp++;else brp++;
      if(closes[closes.length-1]>e50)bp++;else brp++;
      var verdict=bp>=4?"BUY":brp>=4?"SELL":"HOLD";
      var vc=verdict==="BUY"?"var(--gn)":verdict==="SELL"?"var(--rd)":"var(--yl)";
      var hi=Math.max.apply(null,closes.slice(-20)),lo2=Math.min.apply(null,closes.slice(-20)),pv=pivCalc(hi,lo2,closes[closes.length-1]);

      o+='<div class="grid"><div class="card"><div class="card-title">Verdict</div>';
      o+='<div style="font-size:28px;font-weight:800;color:'+vc+'">'+verdict+'</div>';
      o+='<div style="font-size:11px;color:var(--dm);margin-top:4px">Bull:'+bp+' Bear:'+brp+'</div></div>';
      o+='<div class="card"><div class="card-title">Technicals</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
      o+=metric("RSI",_rsi,_rsi>70?"OB":_rsi<30?"OS":"OK",_rsi<60&&_rsi>40);
      o+=metric("Trend",_st.t==="BULL"?"Bullish":"Bearish","",_st.t==="BULL");
      o+=metric("9 EMA",fmt(e9),e9>e21?"Bull":"Bear",e9>e21);
      o+=metric("50 EMA",fmt(e50),closes[closes.length-1]>e50?"Above":"Below",closes[closes.length-1]>e50);
      o+='</div></div>';
      o+='<div class="card"><div class="card-title">Levels</div>';
      [["R2",pv.r2,"var(--rd)"],["R1",pv.r1,"#ff8a80"],["PP",pv.pp,"var(--yl)"],["S1",pv.s1,"#69f0ae"],["S2",pv.s2,"var(--gn)"]].forEach(function(x){
        o+='<div style="display:flex;justify-content:space-between;padding:5px 10px;border-radius:6px;background:var(--s1);margin-bottom:3px;font-size:11px"><span style="color:'+x[2]+';font-weight:700">'+x[0]+'</span><span>₹'+fmt(x[1])+'</span></div>';
      });
      o+='</div></div>';
    }
  }

  el.innerHTML=o;
  if(S.stockData){initTV('tv-stock','BSE:'+S.stockData.symbol,'D')}
}

function render(){
  renderTicker();renderNav();
  if(S.tab==="stock"){document.getElementById("main").innerHTML="";renderStockContent()}
  else{document.getElementById("search-wrap").style.display="none";renderMain()}
}

// Helpers
function cell(l,v,c){return'<div class="data-cell"><div class="data-label">'+l+'</div><div class="data-value" style="color:'+c+'">'+v+'</div></div>'}
function metric(l,v,s,g){var c=g?"var(--gn)":"var(--rd)";return'<div class="metric" style="border-left-color:'+c+'"><div class="metric-label">'+l+'</div><div class="metric-value" style="color:'+c+'">'+v+'</div><div class="metric-sub">'+s+'</div></div>'}
function ruleList(items){var o='';items.forEach(function(t,i){o+='<div style="display:flex;gap:8px;padding:6px 8px;border-radius:6px;background:var(--s1);margin-bottom:4px;font-size:11px"><span style="color:var(--ac);font-weight:700;flex-shrink:0;font-size:10px">'+String(i+1).padStart(2,"0")+'</span><span>'+t+'</span></div>'});return o}
function cfgIn(l,v,oc){return'<div class="cfg"><span class="cfg-label">'+l+'</span><input class="cfg-input" type="number" value="'+v+'" onchange="'+oc+'"></div>'}
function cfgTgl(l,on,oc){return'<div class="cfg"><span class="cfg-label">'+l+'</span><button class="toggle '+(on?"on":"off")+'" onclick="'+oc+'"></button></div>'}

// ─── BOOT ──────────────────────────────────────────────────
checkBackend();loadHistory();S.result=runAnalysis();render();
setInterval(doTick,S.mode==="mock"?3000:8000);
document.getElementById("search-input").addEventListener("keydown",function(e){if(e.key==="Enter")searchStock()});
</script>
